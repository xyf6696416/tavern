---
变量更新规则:
  世界:
    当前时间:
      format: 圣历${Y}年 ${M}月 ${D}日 ${HH}:${MM}
      check:
        - 每次事件推进、休息或旅行后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
    当前地点:
      check:
        - 在<user>移动到新地点时更新为对应地点名称
        - 必须使用<Location_Index>中定义的地点名称
    侵蚀度:
      type: number
      range: 0~100
      check:
        - 随着故事发展每次增加0.5~1%
        - 重大恶堕事件可增加更多
        - 净化行动可降低侵蚀度
    侵蚀阶段:
      check:
        - 根据侵蚀度数值更新阶段描述
        - 0~30: 轻度腐化，城市大体秩序尚存
        - 30~60: 中度腐化，不安的氛围蔓延
        - 60~80: 重度腐化，城市已沦为魔窟
        - 80~100: 彻底腐化，诺亚之城陷落
    当前任务:
      type: |-
        [{
          标题: string;
          目标: string;
        }]
      check:
        - 接受新任务时添加，完成后移除
        - 最多保持3个活跃任务
    主要线索:
      check:
        - 获得关键线索时更新
        - 线索用完后清空
    不为人知的事件:
      check:
        - 记录在世界各个角落正在发生的恶堕事件
        - 事件中禁止出现<Location_Index>中的明确地点名称
        - 使用模糊描写，不超过150字
  主角:
    姓名: {}
    阵营:
      check:
        - 根据恶堕值变化：恶堕值<20为光明，20~60为中立，>60为堕落
    等级:
      type: number
      range: 1~999
      check:
        - 获得足够经验时升级
    生命值:
      type: number
      range: 0~最大生命值
      check:
        - 战斗每轮扣除2~5点，击中要害扣除10~20点
        - 休息或使用药水恢复
        - 降低为0时失去战斗力但不会死亡
    最大生命值:
      type: number
      check:
        - 每次升级增加10点
    战斗力:
      type: number
      check:
        - 通常为等级×5~15
        - 装备、训练可提升
    金钱:
      type: number
      check:
        - 完成任务、出售物品获得
        - 购买物品消耗
    经验值:
      type: number
      check:
        - 战斗胜利获得，击败敌人获得其战斗力/5的经验
        - 完成任务获得额外经验
    状态:
      check:
        - 临时状态，如"性欲高涨"、"淫纹寄生"等
        - 无状态时置空
    永久状态:
      check:
        - 永久状态，不超过8个字
        - 如"萝莉控"、"轻微恋足"等
    社交关系:
      type: |-
        [{
          姓名: string;
          关系: string;
          好感: number;
          描述: string;
        }]
      check:
        - 最多显示不超过4个NPC信息
        - 如user未恶堕，堕落NPC对user好感不超过60
    恶堕值:
      type: number
      range: 0~100
      check:
        - 根据恶堕事件、接触堕落物品等增加
        - 净化、祈祷可降低
    雌堕值:
      type: number
      range: 0~100
      check:
        - 根据雌堕事件增加
        - 通常与恶堕值相关但独立变化
    持有道具:
      check:
        - 列出持有的主要道具
        - 包括对恶堕度和雌堕度有潜在影响的道具
  当前互动对象:
    姓名: {}
    阵营:
      check:
        - 一般分为光明、堕落、中立
        - 恶堕值20以下为光明，20以上为堕落
    种族: {}
    性别: {}
    等级:
      type: number
      check:
        - 反映综合实力
    生命值:
      type: number
      range: 0~最大生命值
      check:
        - 战斗扣减，击杀不致死只失去战斗力
    最大生命值:
      type: number
    战斗力:
      type: number
      check:
        - 通常为等级×5~15
    临时状态: {}
    永久状态: {}
    好感度:
      type: number
      range: 0~100
      check:
        - 根据互动行为调整±(3~10)
    恶堕程度:
      check:
        - 描述恶堕程度和阶段，如"恶堕度50（显性期）"
        - 首次生成恶堕值按阵营参考值
    恶堕倾向形态:
      check:
        - 描述可能的恶堕形态
        - 禁止为空
    飞升:
      check:
        - 恶堕值大于80出现飞升进度
        - 小于80显示为"无"
    想法: {}
    外貌描写: {}
  附近重要人物:
    type: |-
      [{
        姓名: string;
        状态: string;
      }]
    check:
      - 列出当前地点附近的重要NPC
      - 每人包含姓名和简要状态
      - 多人时全部列出