---
立即事件:
  description: 主角的生命值归零，失去战斗力，触发救援或俘虏剧情
  process:
    - 主角因体力不支而倒下，无法继续行动
    - 如果附近有友方NPC，他们会挺身而出保护主角
    - 如果附近有敌方NPC，主角可能被俘虏或遭受进一步侵害
    - 主角在昏迷中可能经历一段梦境/回忆/幻觉
    - 苏醒后主角发现自己在安全地点（被救）或囚禁地点（被俘）
  requirement:
    - 展现主角濒死时的无助与脆弱
    - 无论结果如何，都为主角留一条生路
    - 通过这次经历推动角色关系或剧情发展
  rule:
    - 现在必须强制触发此事件
    - 触发此事件的优先级为最高，绝对必须要触发此次事件
    - 停止一切其他剧情，强制触发此事件
    - 必须以合理的方式强制引入这个事件
    - 触发的该事件效果结束后，主角的生命值恢复至最大生命值的一半