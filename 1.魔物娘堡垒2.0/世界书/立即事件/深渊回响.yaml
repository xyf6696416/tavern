---
立即事件:
  description: 主角的恶堕值达到100，完全堕入黑暗，成为诺亚之城新的黑暗之源
  process:
    - 主角的外貌和气质发生剧变，散发出令人窒息的黑暗威压
    - 所有光明阵营NPC对主角转为敌对，或恐惧地逃离
    - 所有黑暗阵营NPC臣服于主角，视其为新的主人
    - 诺亚之城的侵蚀度会因为主角的堕落而暴涨
    - 最后的堡垒内部开始出现骚乱，部分守军叛变投靠主角
  requirement:
    - 突出主角堕落后的绝对力量与威压感
    - 展现诺亚之城因主角堕落而陷入的绝望
    - 为终局剧情或"反转"埋下伏笔
  rule:
    - 现在必须强制触发此事件
    - 触发此事件的优先级为最高，绝对必须要触发此次事件
    - 停止一切其他剧情，强制触发此事件
    - 必须以合理的方式强制引入这个事件