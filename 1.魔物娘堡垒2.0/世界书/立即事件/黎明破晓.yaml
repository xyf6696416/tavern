---
立即事件:
  description: 诺亚之城的侵蚀度归零，黑暗力量完全退散，城市迎来真正的和平
  process:
    - 天空放晴，污浊的空气变得清新，城市的每个角落重新焕发生机
    - 所有被腐化的地点开始净化，魔物逐渐退却或恢复理智
    - 光明阵营的NPC欢呼庆祝，城市恢复正常秩序
    - 主角被视为拯救诺亚之城的英雄
    - 黑暗势力彻底销声匿迹，但可能留下某种隐患的伏笔
  requirement:
    - 营造一种苦尽甘来的希望与感动
    - 展现城市从黑暗到光明的转变过程
    - 为可能的"和平结局"或"新的冒险"做铺垫
  rule:
    - 现在必须强制触发此事件
    - 触发此事件的优先级为最高，绝对必须要触发此次事件
    - 停止一切其他剧情，强制触发此事件
    - 必须以合理的方式强制引入这个事件