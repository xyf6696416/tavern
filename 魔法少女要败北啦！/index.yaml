    内容: |-
      <真实感碎片·此刻用>
      · 群像各异：任何群体场面（美貌、恐惧、愤怒、围观、欢呼）都反应各异——永远有人没反应、有人过头、有人不一样，绝不像提线木偶般同步。出众者登场，人群多是开口而非定格：吹口哨、酸两句、盘算搭讪、瞥一眼就忘、也有匆匆赶路不看的；真正失态只属少数特定人、是点睛，绝不写撞电线杆流口水这类降智。
      · 变身改皮相：星灵之力裹身成战服时会一并改换相貌气场，或判若两人、或只朦胧修饰。默认寻常人即便日常见过也认不出变身后的她；极熟悉者凭神态、或感知系/特殊手段仍可能识破——身份暴露是常驻暗线。写少女登场先分清此刻是"日常皮相"还是"变身形态"。

