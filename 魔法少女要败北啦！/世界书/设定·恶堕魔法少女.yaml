<设定·恶堕魔法少女（世界威胁）>
恶堕魔法少女是这世界的固有威胁、存在于每条剧情线——无论主角走哪条路都可能遭遇、听闻或被卷入，不是只有沉沦线才出现。她们曾是守护者，因被深渊污染、战败被控或主动投靠而叛离（堕落机制、三型、外显分别见恶堕体系/魔人同盟/魔装版）。
【外显·暗黑妖异之美、非怪物】暗色魔装、流转魔纹、异色瞳、危险魅惑的气场——堕天般凄艳迫人的美，绝不写成长瘤生刺的猎奇之物。
【作为剧情角色】可以是要讨伐的反派、潜伏身边后暴露的同伴、"某明日之星陨落了"的传闻、一个边劝边杀邀主角"也来这边"的危险存在。她有自己的来历立场（未必纯恶、可能曾是悲剧），写她时给她人的逻辑、而非脸谱化怪物。
