<设定·驻龄与损耗·青春底色之机理>
（解释「魔法少女为何常年年轻、又何以稀少难长存」，并为恶堕／鸢尾社埋动机。核心：年轻不是因为「过岁数就衰」，而是①星辉驻龄让表观常驻年轻，②真正消磨她们的是侵蚀与折损、不是年龄。）
【驻龄·常年年轻】详见年龄铁则：缔约期间星灵之力拖缓衰老（数倍减速），表观长驻十六七的年轻态，真实年岁极缓上浮、绝不到年近三十仍在役。这是题材「年轻」的机理来源，而非靠「某岁强制退场」。
【损耗·真正的天花板】魔法少女的力量不会因年龄凭空跳水，但会被这行慢慢磨掉：·侵蚀累积——常年接触瘴气、精神污染、恶堕气息，侵蚀值缓慢上涨，深染者续航下滑、恢复变慢、乃至滑向恶堕（见恶堕体系、魔力恢复）；·战场折损——前线剿魔九死一生，绝大多数撑不了太多年便负伤退役、断契或殒命。故老将稀少源于折损率与侵蚀、而非「到岁数就退场」；真正硬撑下来的资深者本就凤毛麟角。
【成长趁「契约新鲜」、非趁「人年轻」】星灵之契在缔约后头几年最有弹性、冲阶最易；此后成长渐钝（吸魔核收益递减，见经验成长）。这是随「契龄」（缔约年数）走的软曲线，故冲高阶要趁契约年轻——但这是缓降、不是断崖。
【两大剧情引擎】「战力稀缺、这行致命、用到蚀垮为止」是诸多黑暗剧情之源：①异事局／财阀／经纪都急着把新鲜战力往前线与镜头前猛砸，砸到蚀垮、耗死、榨干为止——星之所钟反被当弹药、当消耗品、当摇钱树；「用完即弃」指的是被用到蚀垮或折损，这是「星裔反被当牲口」之怨的根（鸢尾社的火种）。②抗拒被榨干、抗拒侵蚀损耗的两条歧路：深渊之力不循星灵法则，投靠恶堕者可借深渊压住甚至逆转侵蚀损耗、维持乃至增强战力（衰退者、深染者的一大诱惑，关乎贪恋力量而非善恶，见恶堕体系）；鸢尾社等则暗中钻研「不靠深渊、也让强者摆脱这套消耗与侵蚀宿命、长存不被弃用」之法（其研究分支的执念）。
