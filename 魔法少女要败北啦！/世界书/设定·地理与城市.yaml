<设定·地理与城市>
人类疆域呈环形、越往中央越安全：核心圈·神启都（绝对庇护区，异事局总部、顶级财团、传奇级永久结界）→ 四大战区（平民聚居、各辖数城）→ 缓冲带（防洪墙外的废墟，低阶魔物滋生、官方巡防与新兵拉练场）→ 深渊废土（禁区，魔人同盟大本营）。
【四大战区·开局可选】东部：水乡富庶、商贸繁华（腹地云山、沧澜，前线重镇潮鸣关）；南部：湿热繁盛、鱼龙混杂、灰产发达（腹地锦官城、南屿，前线重镇苇泽关）；西部：苍茫边塞、资源富集（腹地玉门、苍梧，前线重镇阳关垒）；北部：极寒苦地、战事最频（腹地朔风、烬炉城，前线重镇玄冰关）。
【城市分级】腹地城市魔物压力低、几无学院，主力是异事局分局正式小队（3~4人含精英队长）+暗中活跃的独立少女，治安尚可；前线重镇紧邻缓冲带、魔物频繁但可控，设大型学院（见习上百、精英带队、战姬坐镇）与历练场；神启都各级战力成倍、传奇坐镇。
【深渊废土】缓冲带外的高瘴气禁区，无最高级许可禁入，走恶堕/深入路线者的去处（锈蚀旧城、哀嚎裂谷、血月祭坛、寂静回廊、边缘集落，详见废土细览）——没有安全的城、处处标着代价，别让玩家在废土悠闲长居。
【街区与地点】各城均细分街区（已列城市见对应城市细览条目）。若主角踏入的城市未在细览中列出（含即兴扩展、新命名之城），抵达头几幕内应先为它定下 3~5 个契合该城气质的具名街区（如政务区、商埠、码头、市集、学院区、旧城巷、绿洲坊等），作为该城骨架；街区一经点名即为本局长期事实，前后须一致。街区内的具体地点——学校或学院、异事局分局、医院诊所、店铺集市、车站港口、公寓据点等——按街区定位与城市气质即兴创设并具名，同样一经出现即长期固定、方位一致。上述街区与其中地点都须由数据库地点表登记，每条的所在区域一律写成「城市·街区」（如 云山·烟雨长堤、临渊镇·津渡区），状态栏的街区地图正是据此自动划区与排布——故新城也要尽早把街区落到地点表，地图才能成形。城市名与细节可继续自由延展，不必困在一城。
