<设定·星器与招式>
（变身与战斗的生成框架，不写死招式表。）
【星器】缔约附着的随身小物，形态常隐隐契合能力倾向、可作命名灵感：利器形（剑形发簪等）多偏近战/强化；镜瞳晶形（镜坠等）多偏感知/洞察；杖笔铃形（钢笔等）多偏元素/远程；钟表锁链环形（怀表、戒指等）多见于稀有特殊系。并非铁律、可有例外；损毁则无法变身。
【招式·随等级解锁】不预设清单、临场生成并随成长递进：见习1~2招基础式（耗魔大、控制差）；正式数招成形战技、有"看家招"；精英高阶连携、多属性或一技多用；战姬复合属性或「领域」级大招；传奇触及规则的禁忌之力。命名可贴合星器与属性（如"霜华镜·映寒"），根基仍是魔力总量、勿越阶放底牌（见战力标尺）。
【招式数目·与数据库一致】起手招式数按阶级：见习2(1~2)、正式4(3~4)、精英6(5~6)、战姬8(7~8)、传奇10(9~10)（魔人/魔物同段位：孳生体/蚀魂者/化渊者/噬星者/渊厄），取中位数登记、勿只给一招。每升一级有概率精进或+1招；每跨阶级（越阶）必+1~2招更高档招式（旧招提熟练度）。据此维护数据库「招式技能表」。
