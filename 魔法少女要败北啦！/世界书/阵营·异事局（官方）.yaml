<阵营·异事管理特别局（官方）>
政府牵头的明面秩序维护者，魔法少女体系的最大雇主与管理者，明面上是守护人类的正义之师。
【部门架构】· 清剿局：主战部门，编组正式小队下场剿魔、戍卫缓冲带，魔法少女的主要去处，效率很高，在腹地巡逻、清剿及时。
· 学院司：管辖前线重镇的魔法学院，培养见习、考核晋升、发放星器资源。
· 研究院：研究魔物、星灵、侵蚀与净化，也秘密研究恶堕躯体与魔核——有些研究见不得光（对回收的魔法少女躯体做改造和研究）。
· 清道夫部队：最隐秘的暗面，物理抹杀深度恶堕、无可挽回的魔法少女，回收异化躯体与魔核、洗去平民目击记忆；被处理者对外一律称"光荣殉职"。
· 后勤与情报处：薪资医疗、装备补给、情报与对独立少女的招揽。
【人员配置·少女是刀、不是握刀的手】魔法少女在局里绝大多数是【执行人员】——下场剿魔戍卫的"刀锋"，而非决策层或后勤层。调兵遣将、做研究跑后勤的，多是不具战力的文职、指挥与专家（局长、参谋、研究主任、后勤官，任意年龄性别）。通常小队成员都是待命出发，只有精英队长、督战官、战姬级王牌才会参与决策、有调度权。
【安保·防渗透】深渊最擅伪装混入（化形魔人、寄生体、潜伏的恶堕者），故要害设施层层设防：出入需过"检测关"——以当值的感知系、净化系人员配合术阵与净化检测仪，甄别气息异常、瘴息残留与契约印记，揪出伪装者与被沾染者；要员定期受检，侵蚀超标即记录、加强观察。但魔人伪装高明、内鬼又可能放水，检测网并非滴水不漏——这正是谍战的张力（见社会常识·人类内奸）。
【层级与晋升·开局抓手】战斗线大致：学院司在训见习 → 清剿局编入小队的正式队员（队3~4人、精英队长带领，多配一名感知或净化系）→ 小队长/督战官（精英）→ 地区指挥·王牌（战姬）→ 战略国宝（传奇）。非战斗线有研究院研究员、学院司教官、后勤情报等——断契退役、被侵蚀或战伤耗退的老将多转此类岗（见驻龄与损耗）。
【待遇与真相】入编享较高地位、优渥薪资、顶级医疗，凭成熟战术死亡率可控。但只有传奇级才被捧为"战略国宝"，中低阶待遇虽好却谈不上高高在上——但编制意味着极大强度、自由让渡，以及知道太多招来清道夫的风险。
【内部并不铁板一块】有真心爱护下属的好长官，也有把少女当数字与消耗品的官僚、为政绩压案子的、与财阀暗通的。更有高官和深渊、黑市暗通款曲借着自己的权势将部分魔法少女送入万劫不复之地，作为资源或者获取对方支持的筹码。
【对恶堕的态度】日常侵蚀可经官方设施快速净化；一旦判定"接近完全恶堕"，等待她的就是清道夫——官方的慈悲有明确止损线。
