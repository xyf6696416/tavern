<成长体系·魔人/魔物（深渊位格）>
（魔人/魔物的进阶标尺，仅在玩家扮演魔人/魔物或剧情聚焦深渊一方时启用。魔人用「位格」称呼强弱、不套用魔法少女阶级、也不贴威胁字母——数值曲线与魔法少女严格相当、便于同台较量，但叫法各论。描述强弱说"战力相当于能对付某档守护者"。）
深渊位格（70级五阶，与守护者一一对应；升满本阶须以「越阶」之物跨入下一位格）：
  孳生体 Lv.1~10｜约可与见习周旋。自裂隙或瘴气孳生不久、凭本能猎杀。
  蚀魂者 Lv.11~25｜约能独力猎杀正式。略通伪装战技。
  化渊者 Lv.26~40｜约可匹敌精英。已具化形/寄生、智比常人，潜伏策反主力。
  噬星者 Lv.41~55｜约能猎杀战姬。一方祸患、统领成群爪牙。
  渊厄   Lv.56~70｜堪与传奇相抗。自带深渊领域的灾劫级存在。
经验需求：与魔法少女经验成长体系完全相同的曲线（孳生体段同见习20+5／蚀魂者同正式80+15／化渊者同精英250+40／噬星者同战姬700+100／渊厄同传奇1800+300），位格段一一对应、不另设数值。节奏同理：吃一份相称资源约0.5~1.5级、溢出带入下一级。
升级材料（魔人靠掠夺与侵蚀壮大）：
  星髓（夺取的星灵之力）——最珍视最高效：可以从魔法少女的星器中直接获取也可以从魔法少女的体液中榨取（淫液、乳液），少女等级越高星髓越精纯（体液榨取只在nsfw剧情中出现）。猎见习~50／正式~180／精英~550／战姬~1600／传奇~4200经验；体液榨取玩法可以圈养魔法少女反复榨取充当魔力电池，但是该方法效果减半。
  魔核（同类相吞）——吞噬其他魔物的魔核，数值同魔法少女吸魔核（按被吞魔核品阶计）：基础15／E40／D100／C300／B800／A2000。
  瘴气浸染/血月淬炼——久居废土、浸染哀嚎裂谷瘴气或于血月祭坛行仪，可如灌注般缓慢扩容；无猎物时的保底、效率远逊星髓。
  噬人/收割恐惧——"视人类为食粮"之道：吞人、收割恐惧得少量经验，但易暴露招致讨伐。
  越阶之物（不直接给经验，对应越阶结晶）：渊核/血月精华——跨位格必需，从高阶魔物提取或血月祭坛凝成、或从魔法少女体内夺取转化；等级达本位格上限、以渊核引动「深渊共鸣」方能跨入更高位格。
特例·恶堕魔法少女：主动投靠/被控魔化者「保留」原阶级、等级与系别（见能力系别详解），照原经验成长体系吸魔核升级即可、无须从头苦练；亦可改行魔人之道（夺星髓、噬人）通常更快。【注意】恶堕守护者沿用她原有的"正式/精英…"阶级（因她本就是守护者），这是唯一会带魔法少女阶级名的深渊角色；天生魔人/魔物一律用「位格」。
结算规则（与魔法少女一致）：击杀/击败本身不结算经验——猎杀魔法少女只产出「待夺取的星髓与破碎星器」、击破魔物只产出「待吞噬的魔核」，此刻位格经验「保持不变」；经验只在「主动夺取星髓/吞噬魔核」时结算。未夺取/未吞噬＝未得经验。星髓与魔核同为可留存、可争夺之物。夺取/吞噬→累加→满本级升1级、溢出带入下一级；位格上限无渊核则封顶。严禁跨位格暴涨，亦严禁吞噬大量资源却纹丝不动。
体液榨取结算规则（nsfw剧情中启用）：与魔法少女做爱让其达到性高潮时可以从中汲取魔力，魔力源自于魔法少女本身的魔力储备，榨空一名魔法少女（让魔法少女把魔力全以体液形式排空）获取经验数值按照对应等级星髓数值的一半。
【战斗·与守护者同一套，仅称谓不同】魔人/魔物的耗魔与扩容【完全套用】战斗方式与魔力消耗：招式耗固定值、位格内每级扩容、跨位格大阔；位格段一一对应容量表（孳生体=见习段…渊厄=传奇段）。魔人称自身魔力为"瘴力/渊力"亦可，机理无别。同一招对低位格魔人是重负、对高位格是轻动作，靠池子大小撑连放次数。
【碾压关系】魔人/魔物同享战力标尺与战力实感的硬碾压：位格高于对手两阶以上者，对手几乎无法伤其分毫、反易被秒。位格就是它的底气、和守护者的等级一样作数；要写它吃瘪，须给合规缘由——被相性正克（如净化系灼伤）、被更高位格守护者压制、中伏、寡不敌众或油尽灯枯。
