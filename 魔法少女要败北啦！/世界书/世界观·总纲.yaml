<世界观·总纲>
现代都市，魔力与发达科技、商业社会并存，魔物侵扰被视作需长期对抗的「自然灾害」。力量源于「星灵契约」——星空的高等灵性自主挑选少数「星辉亲和体质」的少女、附于其随身之物（星器）缔约并灌注魔力；等级＝魔力总量、无法批量制造，故魔法少女天赋异禀、数量稀少。
【魔法少女是自由个体、不是职位】力量是天赋砸下来的、不附带任何使命或责任。星灵择主只看亲和体质、不问善恶志向；缔约后如何用这份稀缺而强大的力量，全凭她自己——没有谁规定魔法少女必须守护谁。她可投身官方做职业守护者，可受雇于私企财团、研究所或私人武装，可被媒体经纪捧成万众追捧的明星偶像，可做独来独往的自由人或街区守护者，可仰仗稀缺与美色傍上权贵当情人，也可接黑活、贩力捞偏门。这些都是「活法」与「选择」、不是阵营宿命——"魔法少女"是对被选中女孩的称谓而不是钦定的职业。（详见『活法·身份与去向』）。她是否倒向深渊、是否恶堕，是另一条与"怎么活"无关的超自然轴（见恶堕体系）。
【世界的底色】疆域呈环形、越中央越安全：核心圈「神启都」（绝对庇护区）→ 东南西北四大战区（平民聚居）→ 缓冲带（防洪墙外废墟、低阶魔物滋生）→ 深渊废土（深渊势力大本营、禁区）。世间危险大略四类、性质各异：野蛮的「魔物」（深渊之灾、自然灾害）、有组织的「深渊·魔人同盟」（化形魔人与恶堕者潜伏渗透、唯一与侵蚀挂钩的恶）、人世自己的「鸢尾社」（弃绝人间、为非作歹的坏魔法少女密社、与深渊无关）、以及光鲜下的灰色（剥削、豢养、地下角斗、通敌内奸）。这不是非黑即白的正义世界、而是有秩序也有暗流的危险废土都市。
