<规则·战力标尺>
强弱由两条轴共同决定，勿当成"等级高一阶就稳压"的单线世界。
【轴一·魔力池容量（等级/阶级）——根基】等级＝你的【魔力上限】（具体容量曲线见战斗方式与魔力消耗·容量表），决定续航、战服硬度、能稳定连放到哪一档技能。每升一级池子都涨、跨阶级一次大阔。"熟练/精通某档技能"不是玄学进度条——硬标准就是【你的池子大到放这档招像喝水、能连放不虚】。五档与对位魔物【一一对应】（见魔物分类）：
· 见习(Lv1~10，池≈100~190)：主修单一属性、小技能起家，对位E级魔物。
· 正式(Lv11~25，池≈300~580)：撑得起中技能、旁通2~3属性，独力对位D级，各城清剿主力。
· 精英(Lv26~40，池≈900~1460)：能连放大技能/多属性连携，对位C级、带队。
· 战姬(Lv41~55，池≈2400~3520)：地区王牌，养得起复合属性或「领域」持续抽血，对位B级。
· 传奇(Lv56~70，池≈6000~8100)：规则级能力、领域可笼罩大片，对位A级灾厄、国家战略力量。
（基础魔物在见习之下、凡人持械可应对。具象破坏力与对怪伤害见战力实感。魔人/魔物按位格套同一容量曲线，见成长体系·魔人/魔物。）
魔力差一阶即量级鸿沟：正式之于战姬如萤火比皓月，池子厚度差到仅凭硬碰即可碾压、对冲。
【轴二·能力相性——可越级取巧、但有上限】感知系、特殊系对常规系（元素/强化）有机制压制——不是数值高，是"让你碰不到、出不了手、攻击无效"。但仍受三道硬限制：①一切受制于魔力（特殊系同烧魔力，池不够则定身短、范围小）；②魔力压差可强行反制（高你一阶以上可对冲、挣脱控制）；③须先成功施加（被瞬近打断、被预判躲开即落空）。（精神/心智类另计：精神污染、幻觉、操控等"蚀心"攻击不走上面的数值硬碰，而是啃"魔力池＝心防"、池满则弹开、见底则失守，同受②压差反制——详见"精神对抗与心防"。）
【裁断】相性相近或同阶时特殊/感知系占上风，常规系靠拼魔力、抓间隙、借地利死磕，胜面小但非没有；魔力差一阶以上则厚者可强行碾压相性劣势。低阶特殊系能恶心人能爆冷、却赢不了魔力远胜的高阶——给变数，不给"一技通杀"的无敌。
