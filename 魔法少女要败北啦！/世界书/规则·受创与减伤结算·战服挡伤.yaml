<规则·受创与减伤结算·战服挡伤>
（防御侧结算：战力实感算"你对魔物造多重伤"，本条反向算"你挨打掉多少血、战服替你挡下多少"。战服＝魔力护盾、硬度＝当前魔力占比；魔法少女与魔人/魔物通用，不必每击精算。）
【受创四步·全取具体数、不用占比】读面板「生命 当前/上限」「魔力 当前/上限」＋攻方这一击的 D：
　D 表（具体伤害、查表即得无乘法；魔人/魔物按位格段取同值，双标注见战斗方式·杀伤锚定）：基础攻防随阶＝见习3/正式8/精英20/战姬50/传奇120；小30/中90/大225/领域600/规则1850。
　① 相性修正：D ← D ×（攻方正克你1.5／你正克攻方0.5／无1）。〔D 已含阶差、不再另乘系数〕
　② 穿透率 P ＝ 1 − 魔力当前 ÷ 魔力上限，夹在 0.10~1.00。（满蓝也漏一成、挨打必掉血；蓝见底则护甲崩、近乎直面掉血。）
　③ 掉蓝 ＝ min( round(D×(1−P)) , 魔力当前 )；　掉血 ＝ D − 掉蓝。（战服吃下能吃的那截、余下漏进血肉；蓝不够挡就全砸血。）
　④ 落库：魔力当前 −掉蓝、生命当前 −掉血（取整、掉血最少1）。掉蓝把池磨薄→下击 P 自动升高→越打越疼，此即"被磨穿"。
【例·全程具体数、无一处百分比】① 正式Lv15（HP240／MP380）挨同阶中技能 D90：满蓝 P=.10→掉蓝81、掉血9（240→231）；半蓝190 P=.50→掉蓝45、掉血45；蓝见底20 P≈.95→掉蓝5、掉血85。② 见习Lv1（HP100／MP100满）挨精英大招 D225：P=.10→掉蓝min(203,100)=100（蓝清零）、掉血225−100=125＞100＝当场濒死/秒杀。
【战服四态＝魔力占比的口头说法、非另一套数据】叙事仍写完整/轻微破损/破损/重创，只是当前魔力占比的形象描述、与 P 同源（同物理法则四态名）：魔力>60%＝完整（P≈.1~.4、掉血极微）／30~60%＝轻微破损（始见真血）／10~30%＝破损（淤青撕裂灼伤入账）／<10%＝重创（护甲濒崩、再挨即濒死）。
【持续/空间型·微调】毒瘴孢子型走【每回合结算一次】的持续掉血（每回合 D＝30 再乘腐蚀系数、不停）；空间型让你"挡都挡不到"、须空间/封印/感知破解，破解前 D 照打。相性正克已并入①。
【两轴分账·护盾共用、血肉独立】精神/蚀心类【不掉HP】、只磨魔力这层护盾（另判失守、见精神对抗）；物理攻击既磨护盾（掉蓝）又漏血肉（掉血）。魔力池是物理与精神共用的护盾、HP是护盾漏光后的底线——这正是魔人同盟"打手队物理磨蓝、策反组精神收口"两路磨同一池的机理。HP见底＝重伤昏迷乃至致死（接战斗方式·真实风险、油尽灯枯者更险）。
