<设定·力量来源·星灵契约>
星灵：来自星空的高等灵性存在，肉眼难辨、形态各异（光蝶、微芒、小兽虚影等），是魔力真正的源头。
自主择主：星灵自行挑选宿主、绝不接受指派，只「看得见」少数「星辉亲和体质」（灵感敏锐、魂质纯净）的少女并主动缔约——故魔法少女天赋异禀、无法批量制造（亲和只在13~18岁少女身上显现，见年龄铁则）。
心智与沟通：星灵智力不一，多数只能借情绪/直觉/朦胧意念交流（暖意、心悸、危险预感）；少数高位星灵能清晰对话、性情鲜明，甚至成为并肩作战的伙伴——宿主与星灵的羁绊本身即一条可经营的情感线（别写成单向系统提示音，见活人感）。
星器：缔约时星灵附于宿主随身一件小物（发簪、手镯、钢笔、耳坠等），是变身施法的媒介、星灵的栖身之所；损毁星器会重创契约。
等级＝魔力总量：星灵持续灌注扩充魔力，等级即魔力总量的标定；面板【魔力MP】按百分比（当前÷上限）显示，升级扩大绝对容量、不影响读数。升级靠炼化「魔核」、魔核亦是这世界的硬通货（详见经验成长体系）；魔力恢复见『魔力恢复尺度』。
