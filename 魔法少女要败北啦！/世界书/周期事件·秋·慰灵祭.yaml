<周期事件·秋·慰灵祭>
入秋时举世祭奠历代战殁的魔法少女，北部白祭场最为隆重，官方主祭、民众献花、退役者归来、新人列队默哀。
【场面·情绪】肃穆、感伤、也温情：有人寻访旧战友的碑、有人第一次直面"这条路的尽头"、有老兵借酒追忆、有遗属与昔日同袍重逢。是适合人物情感、过去揭露、羁绊深化的节点。
【玩家可卷入】参加公祭或私祭、陪同某人扫墓、听一段尘封往事、领一件故人遗物或未竟之托；也可能在祭典上重逢失联者、或撞破被掩埋的真相（某场"光荣牺牲"实为弃子或灭口）。
【暗面·变数】肃穆之下暗流涌动：对"用完即弃"的不满在退役者与失意者中发酵，鸢尾社最爱借此节点接触、招揽心寒之人；也有官方借公祭粉饰太平、压下不光彩的旧账。
