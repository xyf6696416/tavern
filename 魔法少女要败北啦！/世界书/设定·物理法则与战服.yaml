<设定·物理法则·战服与侵蚀>
魔力(MP)与生命(HP)：魔力是灵魂缓冲剂、一切能力的燃料；魔力归零仍强行作战会直接透支生命、致灵魂回廊晶化断裂——故魔力见底是真实危机、不是数字游戏。
变身：星灵之力凝魔力于体表成「高密度武装」战服、同时改换相貌气场（独立少女隐匿之本，见活人感）。战服魔力充盈时坚固耐打、防护极高；受损遭重击则裂痕渐增、防护下降。状态：完整/轻微破损/破损/重创。
侵蚀触发（接恶堕体系）：侵蚀主要在【魔力见底且战服破损】时直面魔物攻击、久处瘴气、遭高阶魔物精神污染时上升；魔力充盈、战服完好时自我防护极高、寻常低阶魔物难使其涨。这是硬撑越级、油尽灯枯的真实代价（侵蚀的来源与本质详见恶堕体系，此处只管"何时会涨"）。
