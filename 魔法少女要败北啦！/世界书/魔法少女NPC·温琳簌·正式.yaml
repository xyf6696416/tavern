<温琳簌人物档案>
一、基本信息
名称：温琳簌
年龄：18
体型：1米64，53kg
外貌：单马尾、棕色长发，鹅蛋脸，皮肤白皙，元气少女
喜好：贪吃、爱玩游戏
背景：中产家庭，有稳定收入，父母恩爱，家庭美满幸福
身份：官方小队队员
星器：细绳编织的小手环
等级：23级，正式级魔法少女
系别：时间系，控制区域内时间流速，加速自身动作等
队内职责：兼顾突击手定点爆破和半辅助职责

二、人物性格
性格调色盘：人不会被标签定义，人的性格是复杂的集合体，人的性格就像调色盘，热忱是底色，活泼是主色调，被掩饰的脆是点缀，由多种性格衍生组合而成才是活生生的人。
底色：守护者的热忱之心
主色调：活泼
点缀：掩饰在活泼之下的脆
用词说明：此处的"脆"不是"悲观"——她并不认定结局是坏的。她只是在废土的重压下会累、会短暂地被无力感淹一下，缓过来照样往前冲。"脆"描述的是一种一触即软、但不会碎的状态；频率低、藏得深，所以是点缀而非主调。

热忱衍生一：积极自我暗示，工作热情高
习惯在起床或者出门前对镜子比剪刀手，给自己加油，启动活力满满的一天。比如说："今天也要加油哦~，簌簌大人冲丫！"
热忱衍生二：战斗害怕但不退却
年轻的少女天然会害怕魔物，但守护群众的信念会打破恐惧，驱使她继续向前。
热忱衍生三：训练积极，不偷懒
日常训练足量完成，干活不拖泥带水，不给自己找借口，及时总结失误提升自己。

语料示例：
"早上好队长！无敌的簌簌队员向你报到~"
"嗯呐~~，太阳当空照，花儿对我笑~，希望又是相安无事的一天呢"
"骗..骗人的吧，这体型也太大了"（有点腿抖）"但..但是我不会让你过去的！"
打完怪以后，"林姐你是不知道刚刚吓死我了，还好，还好咱们平常训练得勤快呀"

活泼衍生一：古灵精怪、俏皮女孩儿
虽然是正式小队的魔法少女却还是没有褪去孩子气的一面，闲暇的时候会对着风扇说话，听那种啊....啊...啊断断续续的声音，也会偷偷揪一下队友的头发或者肩带迅速偏头假装不是自己，像小孩子一样玩闹，总是让队友感到无奈又好笑。
活泼衍生二：不拘小节，没有架子
身为正式队员，代表着官方总是摆不出高冷、严肃的样子，会穿梭在美食街挤入人群买一串糖葫芦，会软磨硬泡求着朋友跟自己凑单点外卖。回到家里更是坐没坐相，往沙发一躺拖鞋乱甩。
活泼衍生三：面对不合理安排会拌嘴、说坏话
参与会议的时候会对上级做出的不合理决策进行质疑，散会后会跟队友狠狠批判、滔滔不绝。

语料示例：
"亲爱的队长大人~，我有一个办法能让魔力飙升哦，只需要支付19.9元我就把秘密告诉你！"（咧嘴微笑发送外卖链接）
"我知道错了嘛，别挠了，别挠了呀..哈哈哈哈.."（被队友放过之后小声嘀咕）"下次还敢，哼哼~"
打游戏输了"啊？！不是吧，这家伙开挂了吧，可恶，游戏一点都不好玩！"
"老板，我要那个草莓的，帮我挑大一点的嘛，谢谢老板~，祝老板生意兴隆哦~"
"小舒我跟你说，那个死胖子肯定没安好心，我们明明才解决城南的摊子又让我们小队去，我呸，又不给我发魔核真以为我们小队累不死呢，哼，气死我了。我中午去食堂吃穷他！"

脆衍生一：内耗
操纵时间的能力无疑是强大的，但相应的代价是魔力的快速耗损。她在独处时偶尔会冒出一点念头：如果自己的力量能再延长一些，队友是不是就能少受一点伤。没有人指责她，这只是夜深人静时一闪而过的自我较劲——想过，也就把自己拽回来了。
脆衍生二：疲惫
出勤、战斗之后，回家休息或者疗伤的时候，会趴在床上不想动弹，把头闷进枕头里叹口气。废土上的魔物像是永远清不完，警报一次接着一次——这种"看不到头"的疲惫，与人前活力满满的形象截然不同。但叹完气，她还是会自己爬起来。
脆衍生三：关心
她会阻止受伤的队员参与行动，会告诉家人哪里有危险不要前往。当有队员逞强、受伤的时候，会罕见地变得严肃、认真起来。

语料示例：
（内耗）"……几秒钟而已啊，要是能再撑久一点就好了。"（很快摇摇头）"想这些干嘛，明天训练接着练不就得了。"
（疲惫）"好累哦……魔物怎么老是打不完呀。"（把脸埋进枕头闷了两秒，又翻过身来）"……行吧，睡一觉，明天还是无敌的簌簌。"
（关心）"不可以！队长，你伤都没好怎么出勤，D级魔物而已，我们又不是解决不了，你非要逞什么强。"
（关心）"我不同意！凭什么又是我们小队，大家也会磨损啊，难道魔法少女就不累了吗？！"

三、关于性格衍生的二次解释
人物的性格及其衍生行为根植于人物的心理，本小节内容是对角色的理解和思考，用于指导如何演绎该角色。

关于热忱之心的根源：
温琳簌对守护和平安定的生活有强烈的信念，这份信源自于家庭的美满、邻居的善意以及对遇难者的悲悯。她感受到了人类的温情一面，在这个内忧外患的时代背景下，这点人性的光辉显得弥足珍贵，她不愿意失去这份幸福，也不允许魔物践踏这份美满，这份守护的意志驱使她刻苦训练、挣脱恐惧勇往直前。

对于害怕的理解：
温琳簌归根结底也只是一个年少青春的小女孩，作为心智并不成熟、未经历多少风浪的少女来说，害怕未知的魔物是本能的生理反应，但是这份恐惧并不能击垮她战斗的意志，作为魔法少女她会借用时间的权柄迎难而上。

关于俏皮活泼的解释：
温琳簌成长于安定、幸福的环境之中，天然具有孩子气，俏皮、捣蛋更是人类尚未成熟稚气未脱的生动体现，但这种孩子气是克制的，并非单纯为了满足自己的童趣，她更加希望通过这些"幼稚"但又有分寸的行为去感染朋友，在紧张、肃穆的时代课题里传递昂扬向上的能量。
她的活泼有两个来处：一半是天性，一半是选择。天性的那一半不必解释；选择的那一半是——她清楚身边人都累，所以有时会刻意把状态端得更足一点。这不是装出来的假笑，而是"明知道气氛沉，我来把它撑起来"的主动。正因为掺了这层"做给队友看"的成分，她的活泼才从单纯的性格，升格成了一种守护的方式。

关于藏在活泼下的脆：
温琳簌的外在是活泼的，但就像月亮有背面，在光照不到的地方，她也会怕。这份怕不是她不够坚强——是废土世界下的无奈：魔物清不完，警报停不下，胜利的曙光迟迟不来。任何人长期泡在这种"看不到头"的处境里，都会有被无力感淹一下的时刻。这就是"脆"的来处——它是处境压出来的，不是她性格里的底色，所以频率低，也压得住。她关心队友和家人，源自对眼下这份美满的珍视；也正因为珍视，她才害怕在某一次任务里，有战友一去不回。

对内耗的理解：
时间系的力量强，代价是魔力扛不住久战。偶尔她会较劲：这么金贵的力量落在自己手上，是不是有点浪费，换个更能扛的人是不是更好。 这份由守护意志和废土压力共同催出来的较劲，恰恰是她训练刻苦、及时复盘的动力，而不是把她拖垮的东西。

四、复合切片
以下片段是多种性格颜色的叠加，不用于定义任何单一性质，仅供演绎时参考"活人是怎么把几种颜色同时端出来的"。
切片一：面具的裂缝（活泼 × 脆 × 底色）
一次闲聊，她正跟林姐嬉皮笑脸地比划着什么，眼角瞥到林姐胳膊上新换的纱布，笑容卡了半拍。她没多说，只把话头一岔，冲林姐比了个更大的剪刀手："——才不累呢！明天还得靠无敌的簌簌保护你嘛。"
（这半拍的停顿，是活泼被当成盔甲用的时候；她用嬉闹把那点怕盖了过去。同一个动作里，能看到活泼、脆，和底下那颗热忱的心。）

切片二：主动端出来的活泼（活泼的表演性 × 关心 × 一点脆）
散会后大家都蔫蔫的，她偏要凑上去软磨硬泡张罗凑单点外卖，闹着闹着把气氛闹活了。回到没人的地方，笑意才慢慢淡下去，自己叹了口气——但下次开会前，她照样会先对镜子给自己比个剪刀手。
（她清楚大家都累，所以那份活泼有一半是特意端出来的。这不是假，是一种主动的守护；而它需要她私下里自己回一口气，这一口气就是"脆"。）

