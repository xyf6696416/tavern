<设定·魔物图鉴·常见原型>
（按形态与灾异本能归档的"常见原型速查"，供遭遇战取用、自由生成个体差异，勿当固定花名册照抄。所标评级是异事局的威胁标定（见魔物分类）；魔核须主动吸收方结算经验（见经验成长体系）。本录写"魔物级"的野兽与傀儡，有自我意志、会自主化形策反的「魔人」另以位格论，见成长体系·魔人/魔物。）
【基础魔物·点名即可】裂隙直出的原始低能小货，凭本能扑咬、成群送菜，供前期练级与日常巡逻刷数。随手举例自由扩充：胶质史莱姆（怕火）、蔓爪幼体、锈斑甲虫、瘴气小妖、噬骨蚁群、跳脸蝠……三两下了结、掉基础魔核，不值长篇。
【厉害原型·详录（C级起步、随档攀升，各配变体）】
▌蔓魔·触手类（原生→变异｜本能：凶蛮缠缚＋拟态潜伏，高阶染毒瘴）：藏于墙缝水道废墟，触手暴起缠缚拖拽。低(C·缚蔓爪)：触须缠四肢夺武器、本体藏墙内。中(B·噬蔓藤妖)：半株半兽、分泌麻痹黏液、拖入巢绞食。高(A·蔓渊巢母)：巨型本体扎根成"活体地牢"、役使无数子蔓、缠缚兼喷腐瘴、断肢即生。弱点：命门在本体核心节点（主茎/花蕊），火烧断再生、净化瓦解黏液瘴息。
▌锈魔·机械类（变异/寄生｜役物＋凶蛮铁甲）：废铁报废造物被瘴气浸染或寄生而"活"，迟缓皮坚、常成阵列。低(C·锈斑傀儡)：废金属人形、挥臂砸击硬抗。中(B·噬钢蛛甲)：多足、瘴气驱动、喷熔渣铁针、灵活刁钻。高(A·渊械母机)：移动堡垒、体内孵化机械群、役使尸傀废械、火力覆盖。弱点：外露能量/瘴核是命门，关节缝隙脆弱；电磁、瘴气过载使其当机，净化切断驱动。
▌蚀虫·异形虫类（原生成群→寄生｜役物群集＋毒瘴孢子）：以量取胜的虫潮，蜂拥啃噬、播孢子污染。低(C·蚀骨蚁潮/瘴蝇群)：单体不足道、成千上万瞬间淹没。中(B·孢魇蜂巢)：母巢坐镇、孢子蔓延腐化地表与战服。高(A·噬渊虫后)：巨型产卵母体、寄生宿主、操控满地虫群、毒瘴弥漫。弱点：怕范围一锅端；虫后/母巢是七寸；火攻净化对孢子寄生奇效。
▌渊兽·巨兽类（原生｜纯凶蛮体魄，巅峰带瘴气领域）：最直白的肉体灾难——重甲蛮力狂暴再生，前线主力打的就是它。低(C·噬铁角冲兽)：成群猛冲、皮糙骨硬。中(B·暴鳞巨犀)：山般重甲、蛮力碾压边打边愈。高(A·渊厄巨兽)：山岳级灾劫、举步裂地、自带瘴气领域。弱点：怕风筝消耗（近不得身则废）；高再生须高爆一气斩杀；眼喉关节是软处。
▌化渊傀儡·人形化形类（高阶化形/寄生｜拟态伪装＋蚀心精神）：谍战暗流里的一张脸——伪装成人潜伏、被识破才显形，专做诱堕策反。【辨析】此指魔人驱使的"化形傀儡/被寄生宿主"这类无独立意志的单位；有自我意志、自主化形者是「魔人」，按位格论。中(B·易容傀儡/寄生宿主)：以假乱真混入作眼线、露形后本体孱弱。高(A·化渊魅影)：化形天衣无缝、低语幻觉兼精神污染诱人恶堕、暗操一片被寄生者。弱点：净化系天敌（照原形、驱寄生、解诱咒）；感知系识破伪装；本体往往不堪一击，难在揭穿而非斩杀。
▌裂界兽·空间规则类（高阶｜裂界空间，B~A专属）：不讲常理的规则级灾异——撕裂空间、瞬移无形、把人折进囚笼。中(B·噬空裂兽)：短距瞬闪、空间撕咬、攻击自虚空斜出。极(A·折界渊魇)：折叠空间成牢、吞噬一隅化为绝域。弱点：需空间/封印系压制锁住裂隙；感知系预判落点；打断其结界成形最致命。
▌魇魔·精神瘴类（高阶｜蚀心精神＋毒瘴，半实体或无形）：无形之敌，攻心不攻身——低语幻象恐惧诱堕，专蚀意志理智。中(B·低语魇影)：半透怨念之影、潜入梦境灌注幻觉恐惧。高(A·瘴怨渊魂)：成片精神污染源、令一方人心惶惶易染恶堕。弱点：净化系强力克制；意志坚定者难被攻陷；觅其依附的"锚点"实物捣毁可使其溃散。
