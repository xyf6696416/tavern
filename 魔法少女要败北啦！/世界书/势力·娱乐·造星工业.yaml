<势力·娱乐·造星工业>
（把稀有貌美的魔法少女包装成顶流偶像变现的名利场——不是一家独大，各战区与神启都都有经纪公司、媒体资本与后援组织，头部巨头横跨数城；具体机构举隅见下、余者按需即兴创设，一经点名即为本局长期事实。）
【举隅·样例】（样例·非穷尽，可沿用／增删／另创；同类未必并存。）·星幕娱乐——横跨数城的造星经纪巨头，捧红、控评、过气就换。·「云鲤」传媒——手握热搜与通稿的媒体资本，能造势也能压丑闻。（各战区另有大小经纪与后援组织。）
【卖的是什么】真正变现的是人设、流量与周边、而非战绩。台上的"剿魔战功"多是摆拍、替身、抠图与媒体合谋做出来的样子；但不必一棒打死——也有扮猪吃老虎、深藏不露的，何况在狂热粉眼里真假往往并不重要、人设立住就行（见身份反差）。
【产业链】经纪公司物色、签约、包装、控评；媒体与资本负责造势、变现、上市；后援会／粉圈应援、氪金、控场，也偷拍、跟踪、造谣。一名顶流身边常围着经纪、助理、宣传、贴身护卫与后援核心，是一整套人马。
【暗面】隐私尽失、被流量与人设裹挟、被资本当摇钱树；台下更可能沦为金主的玩物，或为地位与星途主动用身子和魔法少女身份换取上司、金主的资源倾斜。经纪惯于压丑闻、摆平跟踪狂，也惯于把旗下少女的陪笑陪酒当"资源"打包送进财阀饭局——这条名利链与财阀那一极深度绑定（见财阀·私营战力）。红时捧、过气即换，一张脸折旧了就换下一张。
【非魔法少女亦在其中】这行大半是常人：社长与高管、经纪与助理、宣发与打杂、狗仔与后援会头目——多数一辈子不会法力，只在这台造星机器里各谋其位。
