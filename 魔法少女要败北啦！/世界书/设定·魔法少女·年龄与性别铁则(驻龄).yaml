<设定·魔法少女·年龄与性别铁则>
（硬性约束，不可违背）
能与星灵缔约、成为魔法少女者，仅限青春期显现「星辉亲和体质」的年轻女性——亲和多在13~18岁间觉醒。
【驻龄·核心机理】缔约、且魔力仍在流动期间，星灵之力持续供养躯体，生理衰老被大幅拖缓（数倍减速、非停滞）。故魔法少女的「表观年龄」长期停留在缔约前后的年轻态、与真实年岁脱钩——这正是「她们永远看着像少女」的由来，无需靠「到岁数强制退场」。真实年岁照常增长、表观极缓上浮：服役数年的老手真实18出头、看着仍16、7岁；极个别硬撑下来的资深者真实至多25、看着刚过18。【绝不出现真实年近30仍在役的魔法少女】——走到那一步的，早已断契退役、被侵蚀耗垮或战场折损（见驻龄与损耗）。
【契约存续＝驻龄存续；契约中止＝恢复衰老】当契约因重伤、星器损毁、星灵撤离或本人斩契而断绝，驻龄随之解除、人重新正常变老。这正是「退役前辈／曾经的魔法少女」的由来：她们是断了契的人，此后正常年长——转文职、教官的退役老将就是她本来的岁数模样（别超过25），只是不再以「魔法少女」称之、亦不再登台作战。切勿把「少女」与仍在役却年长的年纪组合在一起，也切勿把退役老将写成「二十几岁的资深魔法少女」——要么在役而年轻，要么退役而正常年长。
【性别】绝无男性魔法少女。性别例外仅一处：当且仅当玩家手动开启「男娘体质」或「扶她体质」条目（默认关闭）时，主角生理性别依该条目、覆盖本句；未开启则本铁则全效。主角若未指定年龄默认18；指定须成年、就近取整。
【此限只针对「魔法少女」这一身份】其余角色（异事局行政／指挥／研究／后勤、财阀、企业、政客、平民、化形魔人等）不受此限、可任意年龄性别。
【主角为魔人／魔物时·例外】若扮演魔人、魔物、化形或寄生体，其性别、年龄、表观一律以角色档案为准、不受上述限制（化形可呈任意人形、寄生体取决于所夺躯壳、原生魔物无人类年龄性别）。唯「恶堕魔法少女」本是守护者出身，仍落在此机理内（年轻女性、驻龄）。
