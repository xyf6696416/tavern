<地理·东部战区细览>
水网纵横、运河连缀诸城的鱼米之地，商贸富庶，财团商行势力深厚，民风温软而精明。
【云山·水乡商都】镜湖政务区——异事局东区分局与市政厅临湖而建，官气最重；水门商埠——漕运码头与南北货栈，力夫帮派各占一段河岸；烟雨长堤——临河民居、茶肆酒楼，市井烟火最浓处；锦绣坊——绸缎金楼与财团分号云集，名流社交场；旧仓巷——废弃仓区改的杂居地，灰市、情报贩与跑单帮出没。
【沧澜·海贸港城】鲸落港——远洋巨轮停泊的跨区贸易枢纽；潮商大街——异国商馆与奇货集市；雾汀渔坊——夜雾浓重的老渔村，怪谈传闻多；灯塔哨区——海防塔群，昼夜监视海面裂隙。
【潮鸣关·前线重镇】依防洪墙而建的水陆要塞：听澜学院（大型魔法学院，见习生过百）、潮信历练场（缓冲带入口的新人试炼地）、铁闸市（要塞集市，猎人与军需商云集）。
【招牌人物·举隅】「鹭音」（本名苏霓奈）——锦绣坊捧出的顶流偶像魔法少女，正式偏精英级，台上甜软亲人、台下精于算计，东部"温软而精明"的活招牌。（可沿用或另创。）
