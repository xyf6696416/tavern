<恶堕外显·魔装显化版>
（恶堕的外在表现·重魔装风格。门槛：「未染」阶不取用本册任何规格——无暗纹、无异色瞳、无征兆，外观言行与寻常魔法少女无异；自「初蚀」起按当前阶段取用对应规格，与恶堕体系的行为心理合并落笔，数据库中战服／躯体记录以本册同阶为准。）
第1阶·初蚀｜服饰：明亮圣洁如常，仅激战或情绪剧变的刹那布料深处暗纹一闪即逝、旁人多当眼花。身体：外表无变化，动怒或滥用力量时瞳底掠过极淡异色（暗红/暗紫）转瞬即退。
第2阶·沉沦｜服饰：圣洁感褪色、主色调暗沉，边缘裙摆接缝生出固定暗色魔纹勾边并被侵蚀出破口，剪裁转凌厉、透出一缕妖冶。身体：暗色魔纹（藤蔓状、非疮非刺）稳定爬上手臂后颈锁骨，平时隐于衣下、动用力量时浮现泛光；情绪激动满瞳染异色、平复方退。
第3阶·半堕｜服饰：大面积异化为暗黑魔装，深紫/暗红/墨黑取代明亮，廓形华丽而危险、魔纹如活物流转生辉——堕天般凄艳、令人不敢直视的美（仍是得体战斗装、不走暴露）。身体：魔纹遍身常显微光，瞳色固定异变（妖红/魅紫），眼神冷锐、笑带危险魅惑，魔力外放气场压人——但仍是清晰人形、五官还是她。
第4阶·恶堕｜服饰：魔装登峰造极、暗黑妖异之美到极致，俨然魔人同盟干部的威仪，变身已是深渊之力流转、再无半分圣洁。身体：完全暗黑魔化形态，魔纹与异色瞳成常态、魔力汹涌不敛——但始终保有完整人形与本来容貌，是"美得危险的她"而非面目全非的怪物（这正是最瘆人处）。
