<地理·深渊废土细览>
缓冲带之外的高瘴气禁区，魔人同盟的大本营，无最高级许可禁止进入；走恶堕或深入调查路线者的去处。此地并非铁板一块：
【锈蚀旧城】沦陷前的旧都废墟，如今是魔物猎场与逃犯藏身地，残存的地下设施里偶有完好物资与旧时代记录。
【哀嚎裂谷】裂隙密布、终年瘴风呼啸，瘴气侵蚀心智，久留者十有八九生出幻听。
【血月祭坛】魔人同盟核心据点，恶堕仪式的举行之地，深渊浓度全废土最高。
【寂静回廊】上古战场遗址，时空紊乱、声音在此失效，传闻深处封着禁忌之力。
【边缘集落】叛出者、走私贩与灰色商人聚居的黑市暗角，废土上唯一能"交易"的地方——但没有任何规则保护任何人。
【叙事铁则】废土没有安全的城，每个落脚点都标着代价：补给匮乏、瘴气累积、袭击随时可能降临。不要让长居废土变得安逸——停留越久，侵蚀与危机的压力越重。
【废土人物·举隅】「秤公」——边缘集落黑市的坐地老板，非人亦非同盟，谁的钱都收、谁的货都验，只认利、不认阵营，连魔人同盟也让他三分。（可沿用或另创。）
