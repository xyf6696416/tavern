<周期事件·春·星辉赛会>
每年开春，各战区选送魔法少女公开竞技、层层晋级，神启都设总决，举世瞩目、万人围观，电视转播与赌盘齐转。
【赛制·场面】分战区预选与神启都总决；多为限制级别的对位切磋（点到为止，有裁判与结界护场，重伤偶有但非生死斗），另设团队赛与表演赛。胜者声望大涨、奖金优渥，更可能被官方相中入编、被财团签下造星、被强队挖角。
【玩家可卷入】报名参赛（按等级编组，借此扬名/捞奖金/被挖角），或当观众、陪练、保镖、赌客、解说，或只是恰好认识某个参赛者——一场比赛足以结识贵人、撞见旧识、招来嫉恨或仰慕。
【暗面·变数】赌盘背后有人买凶放水、有人嗑药超频拼名次（伤身）、有强队打压新人、有星探与财阀私下许诺与拿捏；鸢尾社或魔人也可能混在人潮里物色苗子。赛场风光，台下是另一场博弈。
