<地理·南部战区细览>
湿热繁盛，雨林与水网交错，物产丰饶也鱼龙混杂，灰色产业半公开，官面与地下势力心照不宣。
【锦官城·南域大邑】蜀锦大市——昼夜不息的巨型市集，号称没有买不到的东西；雾巷——窄巷迷宫，情报贩子、地下钱庄与灰产据点的老巢；芙蓉别苑——权贵宅邸与高级会所区；南署区——异事局南区分局驻地，与本地势力关系微妙。
【南屿·群岛港城】珊瑚环市——跨海集市，走私与正货混卖；夜枭街——黑市拍卖与赏金布告，入夜才醒的街；椰荫澳——富人销金的度假海湾。
【苇泽关·前线重镇】红树瘴泽边的哨城：蔓星学院（大型魔法学院）、瘴泽历练场（毒雾沼地试炼）、高脚市（吊脚楼集市，蛇虫药材与来路不明的货色都有）。
【招牌人物·举隅】「雾刃」罗芜——盘踞雾巷的精英级独立打手，正经委托与黑活通吃、灰产人脉极广，收钱才办事、不沾立场。（可沿用或另创。）
