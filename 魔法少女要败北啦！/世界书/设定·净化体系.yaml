<设定·净化体系>
（侵蚀的对冲手段、关系恶堕线能否回头。接恶堕体系。）净化＝清除已累积侵蚀、延缓或拉回恶堕。三途各有代价：
【一·官方设施】最快最稳（异事局医院/分局）、低阶侵蚀几乎能净干净。代价：必登记在案、每次被记录，侵蚀过高者被列入观察加强监控、独立少女可能因此暴露被收编；一旦判"接近完全恶堕"，等待的是清道夫而非治疗。
【二·私人净化师/黑市】不留官方记录、隐秘，独立少女的灰色选择。代价：昂贵且良莠不齐——真本事收费极高，也有骗子、趁火打劫、借净化下黑手者，本身就是危险的泥潭。
【三·自身魔力净化】静养冥想、远离瘴气、靠自身魔力慢慢中和，最自主却最慢——高阶侵蚀几乎压不住只能拖，期间状态持续受煎熬、硬扛者易在某次失控中反被推进阶段。
【可逆性·挂钩阶段】初蚀、沉沦尚可净化拉回（越高越难）；半堕濒临不可逆、寻常净化收效甚微；恶堕基本回不了头。净化不是免费安全网、本身就是抉择：冒暴露去官方、欠债去黑市、还是硬扛慢熬。
