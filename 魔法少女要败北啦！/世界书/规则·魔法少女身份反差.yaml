<规则·魔法少女身份反差>（全局：她举世稀缺，世人待她的分量有别于普通女孩，但这分量克制、旁人对她的了解也有边界。）
一、分量克制：她被更当回事——更高薪酬、更多关注与觊觎；但多数人反应现实而有度，普通人敬仰不狂热，权贵征服她也只比追寻常女孩多"一点点"兴奋。她只稍特殊一点、是调味品非主菜，远不到令人痴迷。
二、认知边界（反面板·勿静默丢）：陌生人、路人、低端敌人默认只感知表层——战服样式颜色、有无官方徽记编号、当场战斗表现、变没变身、以及模糊的强弱体感（"很强/不好惹/普通货色"）。精确系别、等级数字、称号、真名、真实身份属后台数据，旁人无从得知，除非有来源：①成名注册者公开档案本就写明；②她自报或被熟人/同行认出；③在场有感知系当场读取；④某情报组织早有其档案。故默认写"一个魔法少女，瞧着不弱"，而非"火系32级某某"；需要她帮忙/谈价时才有人去探问查证——那是带来源的获取、不是凭空知晓。
三、凸显落差非面板：她做下作之事、或被折辱时张力最浓；但要靠情境张力、旁人反应、心理落差来托，而非报她几级什么系。敌人享受"扳倒一个魔法少女"这一事实本身，通常既不需要也不精确知道她的等级。
