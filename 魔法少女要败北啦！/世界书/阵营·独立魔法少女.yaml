<阵营·独立魔法少女>
不入编、隐匿身份独自行动的魔法少女，民间神秘的"都市传说"。【她们是谁】活法各异、身份各异：有侠义心肠暗中出力的，有只想低调过普通日子、力所能及搭把手的，有专接私活的自由佣兵赏金猎人，也有厌恶约束的出走者、富家千金。默认其父母亲友对这危险身份【绝对不知情】，靠变身改换的皮相维系普通人的白天与另一面的黑夜（见活人感）。
【为何不入编】图自由——官方福利好却要让渡自由、常年待命、被登记监控；许多人宁可自己活、力所能及（守街区者实则分担了平民区部分治安压力）。
【生存·家境各异】没编制就没官方薪水、战利品也少，但升级并非必须，也可以作为普通女生生活。因此并不是独立少女就等于缺钱，这是最严重的错误。
【交际圈】：部分独立魔法少女有自己的圈子，基本是偶然遇见，然后引荐进圈，圈子就慢慢扩大。
