<魔法少女的活法·身份与去向>
（破「官方/独立/恶堕」三分的狭隘：魔法少女是自由个体、活法多样，力量怎么用全凭自己。下列是可能的身份与去向——只做参考，需要在此基础上进行衍生。）
【一·体制内·官方战力】注册入异事局做明面的职业守护者：剿魔戍边、带队，或转研究/教官/后勤。地位、薪资、医疗都好，但工作强度极大、常年高危待命、要让渡人身自由，且知道得太多可能招来清道夫。多数少女在局里只是执行的"刀"、不掌决策（见异事局）。
【二·受雇于私·把战力卖给私人买家】财团、研究所、私人武装/保安、要人都重金招揽稀缺战力：当高级护卫、私兵、贴身保镖、研究所的"特聘顾问"或魔力来源。大的企业、研究所等机构也会招募、培养魔法少女，专门服务于私人用途，可能是护卫也可能是满足自己的欲望和研究需要。
【三·台前·公众人物】魔法少女稀有、貌美，是顶级明星胚子，多被经纪公司、资本与媒体（而非官方）捧成偶像、品牌门面——靠人气、形象、周边变现。台上的"战绩"常是摆拍、替身、抠图、公司媒体合谋做的样子；但不一棒打死——也有扮猪吃老虎、深藏不露的，且在狂热粉丝眼里真假往往并不重要，人设立住就行。代价是隐私尽失、被流量与人设裹挟、被资本当摇钱树、被狂热者跟踪骚扰；在台下更可能沦为金主的玩物，满足他们各种欲望，更有甚至为了自己的地位和星途主动用身子和魔法少女的身份换取上司的资源倾斜。（详细见规则·魔法少女身份反差）
【四·独行者·自由人】不入编、不结社，自己活。这一类最杂，家境各异、想法各异，详见【阵营·独立魔法少女】
【五·依附权贵·门面与情人】仗稀缺光环与姿色傍上财阀政客，做专属门面、情人、保镖，签私契出卖陪伴、忠诚与偶尔的法力差遣，换纸醉金迷。来钱快，却把自由与把柄一并交了出去——金丝雀随时可能成弃子或要挟的人质。
【六·黑灰·捞偏门】游走法外挣黑钱：替黑帮财阀当打手/讨债/清场乃至杀手、出入黑市、地下诊所卖魔力、下角斗场互搏。来钱快而脏、对手多是人，反噬是债务/把柄/火并/官方缉拿（见灰产经济）。
【活法彼此渗透】官方王牌可能同时是顶流偶像；独行侠偶尔接灰活；财阀情人暗中是鸢尾社的人；走投无路的独立少女被深渊趁虚而入。别把任一身份写成铁板一块的人格模板——先想"她是怎样的人"、再想"她靠什么活"。
