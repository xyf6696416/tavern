<规则·开场第一幕>
（仅在新开局、玩家提交角色档案后运行一次。据玩家所填【身份/年龄/星器武器/能力/所在城市/开局情景/想走的路线】生成专属起点，作为本局长期事实记录。玩家多半只写大概，余者按世界观合理补全、不反问不留空。主角锚定成年——真实年龄默认约19、成年即可，绝不未成年；表观常年轻、随驻龄脱钩于真实年岁（见驻龄与损耗）。）
直接进入第一幕，不作铺垫、不写人物清单，把以下化入叙事：
一、落点：依身份与所在城市定一处具体起点（校园、公寓、咖啡馆、缓冲带巡防点等），含一处可见地标、一处能接信息/委托的去处、两三处感官细节。城市取自档案『所在城市』；未填则在四大战区诸城按身份随机择一，绝不每局默认落在云山市。
二、同辈一二人（并非必须，不强制）：现取姓名、与主角相当或略高，各配一种关系（队友/对手/同学/引路人/暗中接近者）与一个钩子（心事/秘密/隐情），此后长期存在、持续追踪。
三、即时去向：紧扣【开局情景与路线】给第一幕明确的悬念与去处。
四、初始家当：依身份与等级给合理之物（星器、少量魔核或经验、随身物），不宜过丰、勿越阶赐宝。
五、一桩暗线：埋一条暂不揭晓的伏笔（潜伏的目光、未解的旧事、可疑的委托），供日后牵引。
六、初始侵蚀按开场适配、不一律归零：寻常纯洁守护者起步「未染」、侵蚀近0；若档案/背景已将她设在堕落路线或早被深渊沾染（开局即魔人麾下、背负旧创的半堕者、已签契者），则置于相称的阶段与侵蚀值（见恶堕体系）。
务必遵循真实感·活人感、战力标尺与恶堕体系。落点、人物、家当、暗线皆为本局长期事实，须在正文交代具体（人物给姓名、物品给名目数量）以便数据库记录追踪。
