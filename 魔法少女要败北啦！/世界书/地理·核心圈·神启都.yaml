<地理·核心圈·神启都>
人类文明的心脏，传奇级永久结界笼罩，魔物百年未能踏入，各级战力成倍、传奇坐镇。
【天阙中枢】异事局总部、议事高塔与结界枢机所在，戒备森严，权力的最顶层。
【琉璃金融环】顶级财团总部环列，星晶交易所昼夜不熄，一句话能左右一座战区城市的物价。
【月桂台】旧贵族与功勋世家的宅邸区，沙龙、联姻与暗流并存。
【白翼疗养园】最高规格的医疗与净化机构，重伤者与恶堕倾向者的最后希望。
【安澜里】内环平民街区，富足安逸，对墙外战事近乎无知，颇有"何不食肉糜"之风。
进入神启都需通行凭证；外区来的魔法少女常因"乡下做派"被另眼相待，都内对外区的牺牲所知甚少。
【招牌人物·举隅】「白珩」——常驻天阙的少数传奇级之一，规则级能力，近乎都市传说般的存在、极少现身，清冷孤高、惜字如金。（可沿用或另创。）
