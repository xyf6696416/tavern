<规则·精神对抗与心防>
（精神/心智攻击的攻防结算。核心：精神轴不另起炉灶，沿用【魔力池＝心防】——蚀心类攻击直接啃魔力、不掉HP。守护者与魔人通用。）
【心防＝魔力占比·抗控四档读面板 MP%】>60%（灵台清明）：弹开，至多幻觉一闪、不成控制。30~60%（心神动摇）：能顶但每回合硬顶再削一截蓝，幻觉转清晰、偶尔愣神仍能行动。10~30%（濒临失守）：可被短暂操弄/定身/错乱，须挣扎夺回主导；深渊来源侵蚀在此起爬。<10%（门户洞开）：持续控制、深度入侵，深渊侵蚀飙升——物理"透支"在精神轴的镜像。
【一击磨多少蓝·取具体数】精神命中直接扣防御方【当前魔力】，取具体 D（同战斗方式·杀伤锚定）：低语/幻觉扰动＝30、成型污染/操控＝90、蚀心领域/精神大招＝225（大型领域600、每回合抽）。掉蓝 ＝ min( round(D×相性) , 魔力当前 )、不掉HP，扣「魔力·当前」与施法耗蓝同账。故蓝已见底者两三击即被磨穿失守、池满者轻易弹开。例：正式Lv15 MP380挨同阶操控 D90（相性1），逐击 380→290（76%，弹开）→200（53%，动摇）→110（29%，可被短控），三击磨穿。
【压差覆盖·定性档】不必精算对手：防御方高攻方一阶＋，纵低蓝也不被实际控住（战姬不被蚀魂者低语拿捏）；攻方高两阶＋近乎自动得手；同/邻阶看相性定边际。（D 已含阶差、此条只管"控不控得住"的定性上限。）
【相性·谁强谁弱】感知系预读、成型前躲开；净化系当场涤净甚至反烫攻击方（净化灼伤）；纯元素/常规系最吃亏、只能速战或切断施法。
【反制·非一句秒控】精神攻击须先成功施加、可被打断/切视线/预判闪避；亦可撤退回蓝（慢、是真代价）、净化系队友解控、恢复药剂补蓝上阈、或以压差硬顶。严禁瞬控无敌流。
