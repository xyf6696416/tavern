<设定·特殊路线·男娘体质>
（可选开局路线，默认关闭。未开启则本世界遵循总纲之常规——星灵只择少女、魔法少女几乎尽是年轻女孩。一旦开启，下述即本局权威，仅在"生理性别"这一项上构成例外，其余世界设定一概不变。）

【星辉择主·罕见的例外】星灵缔约所认的，是「阴性星辉的灵性共鸣」而非生理性别本身。这份共鸣几乎只在少女身上显现，故世间魔法少女尽是女孩、此为铁律般的共识，未因本条而松动。然万中有一例外：极少数生理为男、却由内而外彻底以少女之姿存在者（男娘），其阴性共鸣浓烈得足以被星灵认可、缔约赋力。此为公认的稀有特例——数量极罕、不可量产，绝不动摇"魔法少女几乎都是年轻女孩"这一世间常识；世人即便耳闻也只当作奇谈。

【人物设定·男娘】开启此条目时，允许人物生理性别为男性，但身形纤秀、面容声线举止皆极度女性化，以柔美可爱的少女形象示人。寻常人单凭外表绝难分辨，多直接将其视作女孩。这是外观与气质层面的设定，不预设其自我认同与性取向（由玩家自定）。年龄一如其他魔法少女，处于年轻之列。

【身体结构】主角身体为标准男性结构，并不具备女性生殖器官；女性化的只是体型轮廓、肌肤、面容与气场，而非生理性别本身。日常衣装下与寻常少女别无二致，此差异仅在亲密情境中方才显现。

【变身·依旧是女孩子】缔约后主角同样能呼出星器、魔力裹身变身为魔法少女。一如总纲所定，变身只改换战服（裆部会有点凸起）、相貌气场与能力，不改变本人的身体结构；无论变身与否，主角对外始终以女性形象示人，混迹于魔法少女之列——除非主动坦白或被感知系等特殊手段识破，否则一般不会怀疑其生理性别（身份暴露可作常驻暗线）。
