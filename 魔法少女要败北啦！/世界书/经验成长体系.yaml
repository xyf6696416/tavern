<成长体系_id2>
（注：本条管"升级所需经验"；每级的魔力上限有多大、怎么扩容见战斗方式与魔力消耗·容量表。）
等级与阶级（全程70级，按阶级划分；升到阶级最高级后需激活「越阶结晶」方能跨入下一阶级）：
  见习 Lv.1~10 ／ 正式 Lv.11~25 ／ 精英 Lv.26~40 ／ 战姬 Lv.41~55 ／ 传奇 Lv.56~70。
经验需求（每级递增，格式：起步值＋每级增量）：
  见习(1~10)：起步20、每级+5（20/25/.../65。前期极快；见习还可借日常训练、熟练技能额外得经验，不必全靠杀怪）。
  正式(11~25)：起步80、每级+15（80/95/.../290）。
  精英(26~40)：起步250、每级+40（250/290/.../810）。
  战姬(41~55)：起步700、每级+100（700/800/.../2100）。
  传奇(56~70)：起步1800、每级+300（1800/2100/.../6000）。
核心节奏（最重要）：
  ·【经验只来自吸收/炼化魔核、不来自击杀本身】击杀只产出「待吸收的魔核」、是前置一步；具体结算与示例见下「结算规则」。
  · 吸收一枚【对位魔核】（见习对E、正式对D、精英对C、战姬对B、传奇对A）约带来0.5~1.5级进度（阶段末稍慢但仍可观）。
  · 每阶前半段升级飞快；经验溢出直接带入下一级，宁可升得爽快、不让玩家枯等。
升级材料（魔核为主，按其威胁评级计值，见魔物分类）：
  基础魔核15 ／ E级40 ／ D级100 ／ C级300 ／ B级800 ／ A级2000。
  魔晶矿(粗矿)60（主用于锻造/强化装备、直接吸收效率偏低）；灵能结晶1500（稀有纯能量结晶）。
  经验药剂：初级150 ／ 中级800 ／ 高级3000。
  越阶结晶（不直接给经验）：跨阶级（Lv.10→11、25→26等）的必需品，凝聚高密度魔力的稀有结晶，从高阶魔物提取或是特殊地段开采，一般由官方特许渠道购得；须等级已达本阶上限、激活一枚引发「阶层共鸣」，魔力回廊方能质变跨阶。
结算规则【硬性闸门·必须遵守】：
  · 击杀魔物本身不结算经验：击杀瞬间经验「保持不变」，只产出一枚或多枚「待吸收的魔核」记入状态栏/背包。
  · 经验只在角色「主动执行吸收/炼化魔核」时才结算。未吸收＝未得经验，无一例外。
    ✅「你击碎了魔物，凝出1枚D级魔核(待吸收)。」→(吸收)→「炼化，+100经验。」
    ❌「你击杀魔物，获得100经验。」——跳过吸收，严禁。
  · 魔核是硬通货（性质近黄金）：可当场吸收换经验，也可留存、交易、抵债、换装备或净化；吸不吸、何时吸由玩家决定，系统绝不替玩家自动吸收。未吸收的魔核堆积、不自行衰减、不凭空消失；唯一流失途径是被夺、被劫或主动交出。已炼化的魔力等级不会倒退。
  · 累加规则：吸收→累加当前经验→达本级上限即升1级、溢出带入下一级；若已位于阶级上限且无越阶结晶则经验封顶暂停、直至激活越阶结晶。严禁"从某阶跳到隔壁阶"的暴涨，也严禁"吸了大量魔核等级纹丝不动"的拖沓。
