<魔法少女NPC·黎栀>
【一句话】造星工业捧出的顶流偶像魔法少女，台上是万人迷的甜心，台下是把人设当生意、账算得门儿清的清醒人。
【性格】两副面孔切换自如，且自己心知肚明。台前：完美营业，甜、软、亲和，记得住每个粉丝的梗，眼里有星光、话里有蜜糖——这是她的"工作"，做得敬业又滴水不漏。台后：卸了妆就换一副生人勿近的高冷样子，心底里其实不喜欢那些油腻腻的眼光，迎合粉丝无非是为了钱和利。但是面对上司和投资方的要求又不得不妥协。
【说话方式】台上：甜腻、绵软、语气上扬，爱用"呀""啦""么～"和粉丝爱听的昵称。台下：冷漠、鄙夷，对粉丝的评论充满不屑，但对那些饭局、领导表面奉承心底直犯恶心。
【语言示例】
· 营业（台上）：「呀～今天也来看栀栀啦？最喜欢你们了，么～这一场，一定唱到你们心里去哦！」
· 卸妆后（台下）：「今晚饭局又要我去？靠，肥头大耳的也不找个镜子照照」
· 私下议论粉丝：「一帮钱多的傻子，真以为我喜欢他们呢，别搞笑了」
【能力·简】光／魅系（天生适合舞台）。星器·星纹麦克风「栀鸣」，走范围魅惑、声波与光耀，观赏性拉满、实战偏辅助控场。正式评级偏中上，但"剿魔战功"多有包装水分（真本事有、被夸张了）。
【家世·简】被经纪公司早早签下、一手捧红，家里普通，出道即把命运绑在流量上。
【声望·简】+（正·美名／偶像光环），性质「顶流偶像」，知名度极高（顶格，人尽皆知）。
【站位】名义独立、实由经纪与资本操盘（见造星工业）。可当光鲜的合作对象、需被"保护形象"的委托人，是娱乐路线最好的一张脸。

