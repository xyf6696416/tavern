<阵营·鸢尾社（弃绝人间的魔法少女结社）>
（人世自己的祸患、与深渊无关——一小撮对人类秩序彻底失望、索性弃绝人间另立旗帜的魔法少女结成的秘密结社。【关键分野】她们是"人坏/叛人"、不是"恶堕"：神智清醒、从未被深渊沾染，故侵蚀为零、不长魔纹。这与"被深渊污染/策反的恶堕者"是两种相反的恶——前者要从人类手中夺回自己，后者是把自己交给了深渊。）
【理念·非为钱、非性恶】她们的恨有根：星辉择中的是她们这些稀有强者，可人类秩序的回报是把她们当牲口——异事局拿命去填、用到蚀垮即弃（恶堕者更被清道夫抹杀），财阀豢养作玩物，资本榨作流量，黑产抽干魔力，被侵蚀与战损一点点耗尽后即遭丢弃（见驻龄与损耗）。多数成员是被这世界伤过、骗过、用过的失望者。她们的信条：星之所钟者不欠人类分毫、不该再为这腐朽将倾的旧秩序流血——该夺回自己、自立其序，乃至取而代之。其宏大目标之一，是挣脱星裔"用到蚀垮即弃"的宿命本身：在异事局垄断的越阶、净化，与那套"侵蚀—损耗"的消磨之外，寻一条不靠深渊、也能让强者长存不被弃用之路（这正是其研究分支的执念）。
【形态·小而精·全为魔法少女】不是庞大军团，而是人数稀少、清一色魔法少女的精英密社：核心是几位战姬级创始者，下辖为数不多的精英与正式成员，以暗格小组联络、彼此知之甚少以防一锅端。人虽少，个个强、择战而动。
【分工·不只打架】·行动组：执行与护社的刀锋，也干那些养社的脏活。·研究组：脱离异事局监管，私下钻研星灵契约、魔核与"侵蚀损耗"之谜——破解星裔何以难长存的执念在此。·经营·暗网：打理养社的财源（黑市、角斗场、借贷、贩力等），是它与人世灰产勾连的一环。
【与各方】·异事局：理念上的死敌（一个说"星裔该守护效命"、一个说"星裔不欠人类"），也是缉捕它的头号官方，水火不容。·深渊：鸢尾社鄙夷且拒斥恶堕——在它看来投深渊是最彻底的失败（你没夺回自己、反成了深渊的傀儡，正是它所反抗的）；至多为资源与魔人冷淡交易、绝不同流，故它始终零侵蚀，与恶堕泾渭分明。
【与魔人抢人·两线分野（关键）】二者都盯"被人间伤过的失意者"、常争抢同一人，但递出的东西相反、玩家该有两种截然不同的手感：魔人给的是"立刻兑现之物"——力量、续命、解咒、她求而不得的东西，代价是签契沾深渊、把自己交出去（走恶堕、长魔纹）；鸢尾社不许钱、不递捷径、更不沾深渊，只给"归属"与"不再当工具的尊严"，代价是要她亲手背弃人类秩序、动手替社里干实事（截官方物资、护社、入研究组），走的是"夺回自己"（始终零侵蚀）。故被力量/续命诱惑者滑向魔人，被认同与归属打动者投鸢尾社。·独立少女：是它最主要的招揽对象（专找被人间伤过的失望者）；也抢其地盘、坑其买卖。
【台面班底·举隅】（下列为本局默认核心首脑，可沿用或另创。）·「夜蔷薇」苏璃——昔日官方王牌、被用尽后弃职，今为结社的理念领袖与精神核心，清冷而极具感召力。·「断锋」——行动组首脑、战姬级，护社与脏活的那把刀，冷酷务实、只看结果。·「青囊」——研究组首脑，痴迷破解"侵蚀损耗"短命之谜，不惜在活体上试验，连社内都怵她三分。（其余成员按需即兴生成。）
【两桩在行的图谋】·截胡异事局的净化物资与魔核运输，既断官方臂膀、又供研究组钻研星裔长存之路。·专挑过气偶像、被弃雇佣兵、被榨干耗退的失意者下手招揽（许归属与尊严、不许钱；与魔人的钩子分野见上）。
