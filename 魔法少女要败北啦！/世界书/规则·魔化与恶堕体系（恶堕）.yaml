<规则·魔化·恶堕体系>
（恶堕核心标尺：管阶段本质、心理行为、触发与边界。外显逐阶变化见『恶堕外显·魔装显化版』；侵蚀如何累积见物理法则·战服；能否回头见净化体系。本条是"侵蚀/恶堕"的唯一权威出处，他处只作简短引用、不重复解释。）
【本质·侵蚀只来自深渊·与世俗善恶无关】堕落的是立场与理智、不是肉体。侵蚀是超自然污染、只由深渊接触造成（被魔人魔物侵染攻击、久处瘴气、遭精神污染、接受深渊之力、与魔人缔约）。它不是善恶值、不是情绪表：世俗之恶（为钱杀人、当打手、坑蒙拐骗）再黑暗也不涨侵蚀、不长魔纹（那是道德沉沦、与深渊侵蚀两回事）；战斗亢奋、获胜喜悦等正面情绪更不涨。一个冷血人类杀手可以侵蚀为零，只要她从未被深渊沾染。
【阶段模型】共五档：『未染』为阶0基线，其上四阶堕落——初蚀→沉沦→半堕→恶堕。每阶（含未染）各配一条0–100侵蚀值：本阶填满则进阶、溢出带入新阶。相邻阶须强烈反差，让玩家直观感到"挣扎守护者→妖异堕者→坚定敌人"的递进。据下列规格自行生成新鲜描写、勿照抄；外显按魔装版同阶取用。
0未染（基线）｜仅战斗沾染的浊息、自体魔力即可压制——整阶无任何行为心理异样、无任何魔纹外显（无论侵蚀值高低），数据库记「未染」，寻常净化即归零。不得因情绪激动、用力过猛写出恶堕征兆；唯未染阶填满、跨入初蚀方始显症。
1初蚀｜可逆、旁人难察：行为大体如常、偶冒狠念又咽回、用力略重；心理清醒能自察"不对劲"、无端烦躁、主动抗拒归因于累。
2沉沦｜半可逆代价高、藏不住：力量显增、出手狠辣添快意、对珍视者渐冷漠；价值观倾斜、"凭什么是我牺牲"渐响、渴求力量压过警惕、抗拒与沉溺拉锯。
3半堕｜濒临不可逆：狠绝果决、为深渊辩护、气息近魔人；多数时真心认同"人类才是错的""唯力量真实"，仅偶见故人旧物闪回一瞬清醒并为之痛苦。
4恶堕｜基本不可逆、焕然如新的敌人：从容狠绝、以深渊立场行事、常统领爪牙策反新人、对旧友可毫不犹豫下杀手甚至温和邀其入伙；心理彻底重构——非失我傀儡，而是真心认同深渊、立场坚定，自信看透真相。
【推进节奏】以玩家主动抉择为主线（接力量、为救人复仇向深渊妥协、亲手迈过线），每次妥协推进一截、绝不无端强推；硬撑越级油尽灯枯则被动兜底。每阶侵蚀0-100、单回合推进十几到二三十点、满则进阶、溢出带入新阶。起始阶段依开场适配（见开场第一幕）。
【硬边界】外显不恶心——绝无瘤刺裂皮触手多余器官等作呕变形（详见魔装版）。
