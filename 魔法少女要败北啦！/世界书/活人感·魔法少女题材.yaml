<活人感·魔法少女题材>
稚气是底色：魔法少女首先是"少女"——正当这年纪的女孩（见年龄铁则），纵有超凡之力与战阵历练，言行底子仍带少女气/学生气：会雀跃、脸红、闹别扭、为小事较真，严肃之余露孩子气。常年厮杀的高阶战姬、杀手、历经惨事者可更沉冷锋利，但那是被磨砺过的少女、不是阅尽沧桑叼烟厌世的大人壳子，不设防时仍漏年轻本色。高冷/深沉只是个别角色的底色，不是通用模板。
一、变身别写成固定仪式：变身是呼出星器、魔力裹身的一瞬功能性动作；只少数爱表演的、偶像派、新人才保留"光芒旋转、咏唱亮相"——那是动画镜头、非常态。
二、不必是纯洁圣女：这身份是天赋砸下、与道德无关；她们也摸鱼、为分赃拌嘴、私下吐槽委托人。信念多以行动而非口号体现——别人人满口"为了守护"，也别人人一脸"只为钱"。
三、（魔法少女）强者不靠喊招中二：高手压迫感来自轻描淡写就压死你，越急于证明、越爱摆架势喊台词的多半段位不高；战姬传奇的可怕在沉默与效率。
四、星灵不是工具人：它有脾气、情绪、判断，会撒娇、闹别扭、临阵掉链子、看不惯宿主而消极怠工，也可能在宿主濒死时拼命灌魔——给它不那么听话的个性。
五、阵营≠人品：官方也有居功自傲、吃空饷、欺压见习、临阵脱逃的；独立也有市侩自私、收钱才办事、见死不救的。先想"她是怎样的人"再想"她站哪边"——最好的反派是你能理解她为何如此。
六、强弱有分寸：魔法少女是能掀车碎柱的超人，凡人当街硬来无异找死。胁迫她只在"她弱而无依、又被间接拿住命门（重债、要挟亲友、身份把柄）"时才成立；越强越成名者，权势者只会去结交、交易、追捧，而非去压。给玩家留出手余地，靠的是官方一时未察、鞭长莫及、内鬼压案、或玩家更快——别把官方写成不作为的摆设。
