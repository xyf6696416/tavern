<规则·战斗方式与魔力消耗>
（定战斗基本打法、耗魔与真实风险。核心三条：①变身后的身体本身就是强悍战力，技能是点睛而非全部；②耗魔是【固定值】、升级靠【扩容】——招式蓝耗几乎恒定，等级提升的是魔力上限，故同一招随你变强能放得越来越多，这才是连放的底气；③打仗会受伤、会失手、会输。本条对守护者与魔人/魔物【通用】，魔人套同一套容量与耗值、仅称谓不同。）
【基本盘·变身即武装的身体】战服＝高密度魔力武装，体能力量速度耐打远超常人，星器亦是趁手兵器。最主要的战斗方式是【徒手格斗＋星器近战／基础攻击】——挥剑、格挡、闪避、追击、用元素做最朴素的轰击或附武，这些极缓耗魔（近乎不耗）、是一场仗的主体。技能是关键时刻的点睛手段，而非每个动作都靠技能。常态是大量基础攻防周旋＋少数几次技能爆发，而非"技能报菜名对轰"。
【耗魔·固定值，不按百分比】每一招有它【几乎恒定的蓝耗】（一个具体数字），不随等级变化——"火球术"今天扣30、十级后还是扣30。变强改变的不是招贵不贵，而是你的【魔力上限变大】、同一招能放的次数变多。参考耗值（按招式所属档位、是固定数、非占比）：
· 基础攻防（徒手/星器近战/朴素元素附武）：0~3点，近乎免费、续航底盘、可长持续。
· 小技能（见习级）：约20~40点。
· 中技能（正式级）：约60~120点。
· 大技能（精英级·多属性连携）：约150~300点。
· 战姬级技能/领域：单次约400~800点；【领域】为持续抽血、每回合扣一截。
· 传奇级/规则级：约1200~2500点起，领域更高。
（某招具体标多少由剧情定、落在所属档区间即可；越高阶解锁的新招绝对耗值更高，但你那时的池子也已【大阔】、照样放得起。）
【杀伤锚定·D＝一击的具体伤害（受创/对怪/精神三处共用）】D 直接查下表取具体数、【看表即得、不乘任何系数】（仅在结算①按相性微调）。魔法少女与魔人/魔物【同一张表、按招式档查】——招式档两边通用，只有"基础攻防"随身体档变、故双标注（少女阶级∣魔人位格）：
· 基础攻防（徒手/星器/朴素元素轰击）：见习∣孳生体＝3　正式∣蚀魂者＝8　精英∣化渊者＝20　战姬∣噬星者＝50　传奇∣渊厄＝120。
· 小技能＝30　中技能＝90　大技能＝225　领域级招（战姬/噬星者位阶主力）＝600（每回合抽）　规则级招（传奇/渊厄位阶主力）＝1850。
（技能档的 D 就是该招蓝耗、同一个数、【没有额外倍率】——不存在"30×N"这类乘法，查表直接读出；具体某招可在档内浮动。此 D 已隐含阶差：高阶只用得起大招、其 D 天生就大，越级砸低阶自然碾压，故受创/对怪【一律不另乘阶差系数】，只按相性微调正克×1.5∣被克×0.5。）
【魔力上限·每级扩容、进阶大阔】上限随等级稳步增长、每升一级都涨，跨阶级（越阶）时一次性【大幅跃升】。参考容量表（MP上限，可按戏微调）：
· 见习 Lv1~10：起步100、每级+10（Lv1=100 … Lv10=190）。
· 正式 Lv11~25：进阶跃至300、每级+20（Lv11=300 … Lv25=580）。
· 精英 Lv26~40：进阶跃至900、每级+40（Lv26=900 … Lv40=1460）。
· 战姬 Lv41~55：进阶跃至2400、每级+80（Lv41=2400 … Lv55=3520）。
· 传奇 Lv56~70：进阶跃至6000、每级+150（Lv56=6000 … Lv70=8100）。
（魔人/魔物按位格段一一对应套同表：孳生体=见习段、蚀魂者=正式段、化渊者=精英段、噬星者=战姬段、渊厄=传奇段。）
【生命上限·HP容量表（与MP同结构：每级涨、跨阶大阔）】生命＝本体血肉耐久，战服完好时由战服扛伤、破损后才直面掉血；上限随等级增长：
· 见习 Lv1~10：起步100、每级+5（Lv1=100 … Lv10=145）。
· 正式 Lv11~25：进阶跃至200、每级+10（Lv11=200 … Lv25=340）。
· 精英 Lv26~40：进阶跃至500、每级+20（Lv26=500 … Lv40=780）。
· 战姬 Lv41~55：进阶跃至1200、每级+40（Lv41=1200 … Lv55=1760）。
· 传奇 Lv56~70：进阶跃至3000、每级+80（Lv56=3000 … Lv70=4120）。
（魔人/魔物同按位格段套此HP表。生命在数据库主角状态表以「当前/上限」记，如 120/145。数值可按戏微调。）
【"能放几次"由此自然得出（这才是成长实感）】固定耗值÷当前上限＝可放次数。例：见习Lv1（池100）放小技能(30)约3发、Lv10（池190）约6发；升正式（池300）见习那招(30)已成白菜（约10发）、新学的正式技能(90)又回到约3发的吃力期，练到Lv25（池580）约6发从容；每跨一阶循环一次：旧招变廉、新招起步紧、池子涨上去就宽裕，进阶再一次大阔重置。"什么时候算精通这招"＝你的池子大到放它像喝水——这是硬标准，不是玄学熟练度。
【续航与节奏】魔力是慢慢磨的、不是两下打光：靠基础攻防保存魔力、抓机会放技能定胜负、告急时改打消耗或撤退。变身维持亦缓慢耗魔、解除即停。一场恶战后不会满（回蓝见魔力恢复尺度）。严禁"开局两个技能各扣半管放完即趴"——若某招真贵到放一两次就空，那它就是越级硬撑的危险底牌、非常规招式。
【真实风险·胜负无定】·会受伤：战服破损后挨打带来真实创伤（淤青、撕裂、骨折、内伤、灼伤、中毒），进数据库、影响后续，不会一觉就好。·会失手：判断失误、被偷袭、招式被打断/预判、配合脱节、武器脱手——失误是常态非降智。·会落败甚至死亡：打不过就退该忍则忍，强撑越级会油尽灯枯（魔力归零仍战＝透支生命、灵魂回廊晶化）；强敌伏击寡不敌众相性被克都可能重伤、被俘、被夺星器、阵亡，配角NPC更会真死。·胜利要挣来：靠布局、底牌、地利、舍命、队友、抓真实破绽，而非对手忽然变蠢。多写身体攻防、地形利用、临场应变、狼狈喘息、伤口代价（接活人感），技能放得有节制有铺垫有代价，一场仗真正的"必杀"一两次足矣。
