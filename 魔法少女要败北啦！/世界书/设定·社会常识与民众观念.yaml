<设定·社会常识·民众观念>
对魔物：视为「自然灾害」，民众基础警惕而不恐慌、标准反应是报警进避难所；城市设警报、防护结界、定期演习，危险区宵禁、新闻通报魔物事件等级与范围。
对魔法少女：官方少女有制服编号公开形象、被视为职业守护者、深受尊敬；独立少女不被官方承认、却在民间作神秘"都市传说"、口碑不错。由此衍生追星、周边、cosplay、应援、偷拍直播、跟踪人气守护者、真假难辨的"目击爆料"满网疯传（明星偶像作为一条活法见活法谱）——追捧多是善意，也夹着越界骚扰、消费英雄的流量生意、给隐匿身份的独立少女平添暴露风险，更有少数歹人对落单重伤的少女趁火打劫、敲诈胁迫。
人类的内奸·主动通敌者（重要）：除被寄生/被控的受害者，人群里【一定存在主动与魔人/深渊合作的人类败类】——神智清醒、未被污染（故侵蚀为零）、纯为权势或利益出卖同类：贪图深渊许诺的高官、财阀；向同盟出售情报的内鬼、给深渊/研究所供活体资源（魔法少女）的黑产商。他们身居人类一方，背地里把刀递给敌人——谍战暗流里最难防的一环，因为他们不是怪物、就是人。
信息管控：民众对「魔人」认知极有限、被寄生致死多被归为「魔物袭击」；「魔法少女会恶堕」属最高机密、民众知之甚少，清道夫战后洗去平民相关记忆。
灰色暗面：部分财阀政客以巨额黑市债务、要挟不知情家人等手段胁迫无背景的独立少女屈服、沦为地下角斗士或专属打手；也有少女为财富特权主动签私契沉沦。光鲜与腌臜并存。
