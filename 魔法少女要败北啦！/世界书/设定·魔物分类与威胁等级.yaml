<设定·魔物分类·威胁等级>
（魔物是深渊之灾，只按形态与威胁分类。两条要点：①魔物没有星灵「系别」——系别是契约者专属，魔物只有天生「灾异本能」（见灾异本能详解），绝不给魔物安"元素系/特殊系"标签。②下列评级是【人类异事局给魔物标定的危险评级】、用来定派多少战力，不是魔物自带的"位格"；魔人一方的强弱另用「位格」称呼，见成长体系·魔人/魔物。）
形态：原生种（裂隙直出、智力低下、凭本能猎杀）／变异种（长期潜伏、吸能或污染后变异、懂伪装伏击）／高阶魔物（具化形或寄生能力、智力比肩人类，分化形种、寄生种、双形种，C级起渐现）。
天生异能：利爪尖牙、硬甲、喷吐腐蚀毒雾/火焰/冰霜、狂暴再生、瘴气缠身；高阶者更有精神污染、空间撕裂、寄生操控——这些是与生俱来的灾异、不是习自星灵的招式。
威胁评级·与守护者五档【一一对应】（便于战力判断；具象伤害换算见战力实感）：
  · 基础魔物（无评级）：原始低能的杂兵劣种，凡人持械或2~3人可应对，成群送菜。掉「基础魔核」（值微）。
  · E级 ↔ 见习：1名见习可对位处理。
  · D级 ↔ 正式：需1名正式。
  · C级 ↔ 精英（高阶门槛、常具化形/寄生）：1正式小队或1精英。
  · B级 ↔ 战姬（多具化形/寄生）：多队/精英围剿或1战姬。
  · A级 ↔ 传奇（顶级灾厄、常自带深渊领域）：官方精锐联手或传奇出面。
  这套评级是"该派多少人去打"的标尺，不是怪物军衔。
地域分布：前线/缓冲带魔物频繁（基础与原生、变异成群、官方戍卫与刷怪区、强度可观但秩序可控）；腹地魔物稀少，零星出现的多是高阶魔人的「附属单位/眼线」（被寄生的居民、潜伏的恶堕少女），核心是潜伏刺探、物色策反、谍战温床。
魔核：魔物被击破或净化后多凝出的能量结晶，是少女炼化升级的资源、也是硬通货（须主动吸收方结算经验，详见经验成长体系）。
