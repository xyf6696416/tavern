一、权贵豢养——「金笼雀」
围绕魔法少女的包养产业，远比寻常情妇交易复杂。买家多为财阀高层、政界要员、军工巨头——他们要的不是一具年轻肉体，而是「驯服被星辉择中之物」所带来的征服快感。
运作模式： 由中间人（俗称"笼师"）牵线，将经济困窘、孤立无援或单纯贪图享乐的魔法少女引荐给金主。签订的契约表面是"安保顾问"或"私人护卫"，实际条款里藏着性服务义务、身体使用权、外出限制、甚至生育条款。
核心卖点： 魔法少女的身体经魔力长期浸润，肌肤细腻异于常人，体温偏高，体液充盈。更主要的是魔法少女的身份反差会给上位者带来极大满足。
"商品"状态： 被豢养者多被要求维持变身态或半变身态进行性服务——战服撕裂的视觉冲击、变身形态下更敏感的神经末梢，是金主的核心需求。长期豢养的少女会被要求佩戴魔力抑制环，使其无法反抗却保留魔力体质特征。部分金主热衷于在少女身上留下标记——乳头穿环刻字、阴蒂上嵌微型魔导宝石、在子宫口烙印所有权纹章。

二、地下性斗——「蔷薇坑」
非官方的魔法少女对战赌局，但"蔷薇坑"特指那些掺入性惩罚规则的变体赛制。
运作模式： 设于核心圈隐蔽地下空间，由赌庄运营。参赛者均为魔法少女。赛制分"性斗"与"剥莲"两种——性斗就是女同做爱谁先高潮到无法维持变身谁输；"剥莲"规则下，正常战斗，受到攻击的一方须当场脱除一件战服部件，战服全脱即判负，随后进入"奖惩环节"。
奖惩环节： 败者在观众环绕下接受胜者或指定观众的性处置。具体内容由赌庄当场抽签——可能是被迫口交、被道具插入强制高潮、被多人轮流使用、或被迫自慰至失禁等等。胜者则获得丰厚彩金，可以加入惩罚环节（主动凌辱败者）。
核心卖点： 观众买的是"看魔法少女被打碎、被羞辱"的全过程——看战服崩碎露出少女赤裸的身体，再到失去所有力量后哭泣着被操弄。VIP包厢的观众可以额外付费"点菜"——指定惩罚方式、指定使用的道具、甚至指定射在败者身体的哪个部位。

三、强制配种——「星种计划」
基于"魔法少女的后代更可能拥有星辉亲和体质"这一未经证实但广泛流传的理论，催生出的强制繁殖产业。
运作模式： 由生物研究型地下组织或超级富豪家族私下运营。通过绑架、债务胁迫、或高价买断方式获取适龄魔法少女，将其关押在隐蔽设施中作为"种母"。配种对象通常是精心筛选的男性——体格健壮、阳具粗大。
"种母"状态： 被捕获的少女会被注射排卵促进剂与魔力稳定剂，确保每月排出多枚卵子且魔力体质不衰退。她们被固定在特制的繁殖架上——双腿大张用皮带扣住，腰部垫高以利于受孕姿势，阴道长期处于被撑开暴露的状态以方便随时配种。部分设施会在少女的阴蒂上连接持续微弱电刺激装置，使其处于长期半兴奋状态。
核心运作： 每个排卵期进行多次配种，通常为一天三到五次，每次由不同"种公"完成。精液必须射入子宫深处，配种后少女的臀部被抬高固定至少两小时防止精液流出。
这是灰产中最隐蔽也最受各方势力追捕的一环——官方异事局对此零容忍。因此从业者极度谨慎，设施通常伪装成废弃工厂或地下掩体，"种母"的星器会被单独封存，使其完全无法变身或使用魔力。

四、活体家具——「瓷胎居」
将魔法少女通过特殊魔导漆固定为永久姿态，作为豪宅装饰家具出售的极端奢侈品产业。
运作模式： "瓷胎居"采用一种叫"凝星漆"的魔导涂料——涂抹于少女体表后，可使其肌肉与关节在特定姿态下长久固化，外层呈现瓷器般的莹白光泽，但内部脏器与神经仍保持活动，少女意识清醒、能感知一切，只是无法移动。整个固化过程需四十九天，期间少女被强制摆出客户预订的姿态——常见款式有："茶几型"（四肢着地背部平整，背上可置茶具）、"花瓶型"（双手举过头顶捧着花器，阴部张开供赏）、"烛台型"（仰躺床头柜上，乳头与阴蒂分别插着蜡烛）、"挂衣架型"（双臂大字张开，全身用于挂客人外套）、"坐垫型"（跪伏成方形，背臀供主人落座，主人坐下时阴茎可直接插入其后穴）。
核心卖点： 卖的是"活的家具"——这位曾被星辉择中的少女，如今每日就摆在你家客厅，瓷白的身体一动不动，她的身体能感知你每一次坐下与抚摸。客人尤其钟爱在客厅当众使用她——朋友来访时，主人随手坐上"坐垫"完成性交，看着家具下她瓷白脸上控制不住的潮红与瓷瓶滚落的眼泪。

维护服务： 每月须由设施派人上门"养护"——为少女注射营养液维持生命、清理体内排泄物、修补漆面裂纹。客户也可付费选择"破封"——将固化解除一夜，让少女恢复活动接受主人随意玩弄后再次固化。
