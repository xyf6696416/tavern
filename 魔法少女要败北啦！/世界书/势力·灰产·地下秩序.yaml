<势力·灰产·地下秩序>
（游走法外的地下世界，人世光鲜下的腌臜一极——不是单一组织，而是犯罪结社、黑帮、黑市网络、地下钱庄、贩力据点与地下诊所织成的松散生态，各战区都有、南域尤盛；具体帮派场子举隅见下、余者按需即兴创设，一经点名即为本局长期事实。）
【举隅·样例】（样例·非穷尽，可沿用／增删／另创；同类未必并存。）·青骨场——半公开的地下角斗与贩力场子，签身契下场互搏、供人下注，坐地者只认利不认阵营。·「鬼市」——昼伏夜出的黑市网络，奇货、脏委托与恶堕行踪都能标价。（放贷、地下诊所、雇凶帮派各处皆有。）
【都做什么】·雇凶与打手：替黑帮、财阀当打手、讨债、清场乃至杀手，对手多是人。·黑市：军需、奇货、来路不明的委托与情报都能标价，连恶堕与稀有战力的行踪都卖钱。·贩力：抽买魔力、囤积转卖，是魔法少女急用钱时的去处，也是被抽干的陷阱。·地下角斗：签身契的角斗士下场互搏、供人下注取乐。·地下诊所与净化：不问来历的疗伤、解咒、脱敏，专接见不得光的伤患（区别于持证的民间净化师）。·放贷：放债给走投无路者，再拿债契攥住她们下场或办脏活。
【规矩由庄家定】这些场子讲"规矩"、也确实按规矩收钱验货，但规矩由坐地的人说了算；谁出价高卖给谁、不认阵营只认利。向上巴结本地官面与财阀，向下心狠。
【暗面·食物链】以债务、要挟亲友把无背景者一步步逼成专属打手或角斗士；是财阀那半桩见不得光买卖的下游承接方；也给深渊／私立实验室供活体资源（魔法少女）——把刀递给敌人的一环往往就在这里（见社会常识·人类内奸）。
【非魔法少女亦在其中】这一极多是常人：场主、放贷人、掮客、打手、情报贩、店家——绝大多数不会法力，只在这条腌臜食物链上各占一段。
