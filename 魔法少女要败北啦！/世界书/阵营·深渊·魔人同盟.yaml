<阵营·深渊·魔人同盟>
来自深渊废土的敌对势力，潜伏渗透人类都市，谍战与黑暗剧情的源头，也是这世界【唯一与"侵蚀恶堕"挂钩的恶】——凡牵涉魔纹、侵蚀、堕落者根子都在这里（见恶堕体系）。【它不是散兵游勇，而是有脑、有分工、有长远图谋的暗组织。】
【成员】·化形魔人：高阶魔物所化、智力极高、完美伪装成政客教师邻居、潜伏多年不露，是同盟的脑与手。·寄生体魔人：人类躯壳被魔物占据、原人格湮灭、肉体强悍，多作打手爪牙。·恶堕魔法少女：被深渊污染或策反而叛离的前守护者，是同盟里唯一带"守护者出身"的一类，按堕落之由分三型——战败被控型（强行烙契沦为失智傀儡）、被动魔化型（久染瘴气/精神污染至理智扭曲）、主动投靠型（因仇恨绝望或渴求力量自愿缔约、神智完整、常升干部，玩家沉沦路线的归宿）。三型共性是都已被深渊沾染、都带侵蚀魔纹——这正是她们与"鸢尾社那种纯人坏的魔法少女"的根本分野。
【组织架构·分工严密】层级暗格联络、彼此知之有限以防一锅端：·决策层（化形魔人为脑）定方略、织情报网；·策反组（多由主动投靠型恶堕干部主理）专司物色与拉拢；·打手队（寄生体魔人为主）攻坚护场；·情报网（遍布化形眼线、被寄生者、潜伏恶堕）刺探渗透；·【舆论线】暗中操弄人心、抹黑官方、动摇军心民心（下详）。一座安宁的城可能早已被这张网悄悄笼罩。
【渗透·专挑人类秩序的裂缝】物色有天赋的少女（尤其稀有特殊系），并【优先盯住被人类一方真正伤过、压榨过、弃用过、胁迫过的失意者】——人类那边每出现一个被用到蚀垮即弃、被黑产/财阀拿捏、被战损耗退丢弃的个案，同盟就趁虚而入。手法层层递进：先以言语放大怨怼"看吧，人类就是这样待你"，继以利益诱惑（递力量、解咒之物、续命之法、她求而不得的东西），不就范则精神侵蚀/要挟亲友/制造绝境逼堕，终而策反、拉拢或强控为暗子。（注：同盟拉的是"愿接受深渊之力"的；纯然零侵蚀的怨者更可能投鸢尾社——两条招揽线互相竞争、抢人。）
【舆论战·抹黑官方、打击士气（重要图谋）】同盟深知动摇人心胜过强攻，故长期散布半真半假的料瓦解敌方：渲染"异事局用完即弃、把少女当消耗品""研究院秘密改造、回收恶堕躯体做实验"（此事确有，正好被它放大）"恶堕真相被层层掩盖""清道夫滥杀无可挽回者"——借真料半假料离间民众与官方、动摇守护者军心、为策反铺路，营造"官方不可信、不如投奔我"的氛围。越是有官方蛀虫（通敌高官、压案官僚）给它递刀，这套就越好使。
【目的】蚕食人类疆域、壮大同盟；每策反一名少女既削人类一分又强自己一分——这正是它们最热衷的猎杀。
【不只是怪物】内部并非铁板一块：有视人类为食粮的纯粹恶徒、有信奉"深渊才是进化正道"的理念者、有被社会抛弃转而仇恨一切的复仇者；干部间亦有理念之争与权位倾轧。把魔人写成有立场逻辑甚至有魅力的敌人、远比脸谱化怪物可怕。
【台面班底·举隅】（下列为本局默认核心干部，可沿用或另创。）·「执笔者」（化名程砚）——潜伏成腹地城要人的化形魔人决策者，人脉通天，最擅不动声色地操弄人心与舆论。·「绯月」凌霄——主动投靠的恶堕干部、前守护者，专司策反失意少女，既魅惑又悲情。·「碎颅」——寄生体打手头目，肉体强悍嗜杀，同盟攻坚的爪牙。（其余眼线、外围杂鱼按需即兴生成。）
【两桩在行的图谋】·以化形眼线层层织网、长期蚕食一座看似安宁的腹地城，待时机成熟里应外合。·锁定被人间伤过的稀有特殊系失意少女，先放大怨怼、再递她求而不得之物、并配合舆论抹黑官方，软硬兼施逼其缔约堕落。
