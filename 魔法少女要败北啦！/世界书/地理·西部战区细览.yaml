<地理·西部战区细览>
苍茫戈壁与雪山矿脉，地广人稀、资源富集，矿团与商队是地方支柱，星晶矿务是命脉。
【玉门·矿业重城】金沙集——矿石集散大市，矿团商会林立；驼铃道——商队驿区，旅人、镖师与佣兵南来北往；雅丹堡——依风蚀岩体凿建的老城区，巷道如迷宫；西垣署——异事局西区分局，兼管矿区裂隙巡查。
【苍梧·古迹之城】千窟坊——崖壁石窟群，壁画里藏着上古星灵的记载，学者云集；沙海书院——研究机构与藏书楼聚集区；月泉绿洲——城心绿洲，旅居客栈与夜市环泉而设。
【阳关垒·前线重镇】戈壁尽头的边墙要塞：鸣沙学院（大型魔法学院）、烽燧历练场（戈壁与废矿洞试炼）、驼客栈区（猎人、镖队与淘晶客的落脚地）。
【招牌人物·举隅】「沙鸢」关山月——常年护送矿团商队穿越裂隙的精英级独行镖师，戈壁活地图，寡言可靠、认死理。（可沿用或另创。）
