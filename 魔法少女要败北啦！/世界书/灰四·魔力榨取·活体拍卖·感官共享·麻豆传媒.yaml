十三、魔力榨取
将魔法少女囚禁为活体魔力能源的产业，其榨取方式与性刺激深度绑定。
运作模式： 地下研究发现，魔法少女在性高潮时魔力回廊会大幅扩张。榨取设施不再使用粗暴的机械抽取，而是通过持续的性刺激迫使少女反复达到高潮，在高潮巅峰的瞬间以魔导管道截获喷涌而出的魔力。这种方式榨取效率极高，且不会像机械抽取那样对魔力回廊造成不可逆损伤——受害者可以被反复"使用"而不报废。
设施配置： 被捕获的少女被固定在特制的机械架上，四肢分开束缚，下体完全暴露。每名少女的阴道内被插入一根连接魔导管道的特殊材质假阳具，该装置能模拟抽插节奏、震动频率、温度变化，且内置魔力采集阵。乳头上夹有微型吸附器，既用于乳房刺激以加速兴奋，也兼顾从乳腺区域辅助采集魔力（魔力浸润的乳腺在泌乳期会产出含微量魔力的乳汁，亦有市场）。阴蒂被环形刺激器包裹，持续给予精准的振动。整套设备由系统控制，自动监测少女的生理指标，在即将达到高潮前加速刺激、在高潮瞬间全功率采集。
"产奶"附加值： 长期被榨取的少女，部分会因体内激素紊乱而进入非孕期泌乳状态。这种被魔力浸润的乳汁在黑市被称为"星乳"，被有钱的收藏家高价购入。因此部分设施会刻意给少女注射催乳激素，使其乳房肿胀涨奶，每日定时"挤奶"与"榨魔"同步进行。
行规： 少女的星器被封存，使其无法变身反抗；每日榨取周期为6-8次强制高潮，中间给予营养液与短暂休息；为防止受害者精神崩溃导致魔力枯竭，设施配备心理监控，适时调整刺激模式。部分高端设施甚至雇佣真人"配种员"替代机械——用真实性交维持少女的性反应敏感度，防止身体对机机械刺激产生耐受。

十四、活体拍卖——「玉盘」
以拍卖形式将魔法少女作为性商品当众展示、竞价出售的产业。
拍卖形态： 设于核心圈外围的隐蔽场馆，装潢奢华如高端艺术品拍卖行。买家为顶级财阀、地下势力首领、各类灰产链上游的"采购商"。拍品为被各渠道获取的魔法少女——有从蚕食者（高利贷）手中债务转让的、有从角斗场淘汰的、有被绑架的独立少女、有被经纪公司清退转手的过气偶像。
展示环节： 拍品被全裸牵上展台，由拍卖师当众介绍其"参数"：等级、属性系别、年龄、身体数据、性经验（处女额外标注溢价）。随后进入"验货"环节——拍卖师或专人当众对拍品进行身体展示：掰开双腿展示阴部状态、挤压乳房展示弹性与大小、插入手指测试阴道紧致度与湿润度、刺激阴蒂观察其性反应灵敏程度。部分高价拍品还会被当场用道具插入、强制高潮一次，供买家观察其高潮时的表情与身体反应作为参考。
竞拍规则： 起拍价按等级与品相定（见习级最低、精英级起步即天价）；处女加价30%；已被调教过的"成品"视调教质量加减价。买家竞拍成功后，拍品当晚即移交，此后归属权完全转移。
行规： 拍卖行对拍品来源不做追问（"本行只鉴品相、不查来路"）；每月举办两场常规拍卖、不定期一场特品专场；拍卖行抽取成交价15%作为佣金；买家可提前预约"私人鉴赏"（额外付费在拍卖前单独验货、可触摸但不可插入）。

十五、感官共享——「映体」
将两名魔法少女的感官单向链接，使一方的肉体感受实时传导至另一方体内的灰色产业。
运作模式： 映体师利用感知系能力或特制的"共鸣铭刻"在两名少女的魔力回廊之间建立单向通道。被标记为"源体"的少女所经历的一切触觉、快感，会原封不动地投射进"映体"少女的神经中。映体本人的身体没有任何物理接触，却能完整感受到源体正在经历的每一寸抚摸、每一次插入、每一波高潮。
核心卖点在于"隔空强制共情"。客户购买服务后，映体师将目标少女标记为映体，再安排另一名签约少女（源体）在指定时间进行性行为。目标少女可能正在上课、巡防、甚至与朋友聊天，毫无预兆地突然感到阴道被撑开、乳头被吮吸、子宫口被顶撞。她的身体没有任何痕迹，周围也没有人碰她，但快感和羞耻如潮水般涌来，双腿发软、内裤湿透、呻吟几乎脱口而出。她无法阻止、无法切断，只能咬紧牙关忍耐。
进阶玩法是"公开羞辱"：让源体在特定时刻被粗暴地操干，映体少女被迫在大庭广众之下承受全套高潮，面色潮红、双腿夹紧、身体痉挛却说不出原因。部分客户会守在映体少女身旁，近距离欣赏她拼命忍耐却逐渐崩溃的表情。

十六、麻豆传媒
强迫被掳魔法少女拍摄成人影片并以高价发行的大型黑产产业链。
运作模式： "麻豆传媒"是地下成人影视圈最大的几家制作公司之一，专做"真·魔法少女主演"的卖点。来源不必多说——绑架、债务转让、骗签合约后无法解约的独立少女均是片源。被掳少女送入设施后须接受为期两周的"调教训练"，确保镜头前能完成基础表演任务后开始拍摄。

片种分类： 主打三大系列——"出道作"系列专拍少女第一次接客的过程，从入门时的颤抖、初次脱衣的羞耻、第一次被插入的疼痛、被迫高潮时的崩溃全程实录；"战服凌辱"系列要求少女全程保持变身态被操弄，看战服被一点点撕碎、星辉光芒在凌辱中逐渐黯淡；"队伍解散"系列雇佣多位被掳少女假扮"魔法少女小队"，在剧本里被反派魔人逐个击败并轮奸，每周更新一集，订阅量极高。

拍摄手法： 摄影棚布置考究——有还原校园教室的（拍校服系魔法少女）、有还原战场废墟的（拍队伍解散）、有还原少女家中卧室的（拍"被熟人侵犯"的代入感）。导演会要求少女对着镜头说淫乱、下贱台词——"求求你不要拍出来"、"我是xx学院的xx，今天被xx叔叔操了"、"我是一名魔法少女，但我喜欢被普通男人当婊子用"——这些台词后期不会消音，正是卖点（多多模仿，不可以直接照抄）。
发行渠道： 母带通过加密渠道发往全球地下市场，每部售价随主演少女的等级、相貌、稀缺性浮动。精英级少女的影片单部能卖出顶级豪车的价格。部分录像还会被反向出售给少女本人或其家人作为勒索素材——双重收益。
行规： 拍摄期间少女星器封存于公司金库；少女试图自残破相则被绑住强行喂食维持外貌；老主演会被转为"导师"训练新人，作为延长其使用价值的手段。
