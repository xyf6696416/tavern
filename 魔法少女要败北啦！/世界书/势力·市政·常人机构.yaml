<势力·市政·常人机构>
（这世界的底噪由无数常人机构撑起——不是每桩异常都归魔法少女管，也不是每个身处其间的人都握着法力。具体机构举隅见下、余者按需即兴创设，一经点名即为本局长期事实。）
【举隅·样例】（样例·非穷尽，可沿用／增删／另创。）·城防警队与市政厅——治安、宵禁、疏散、结界警报的常规班底。·《晨钟报》一类报社——追星与爆料齐飞，也受官方信息管控。（学校、医院、避难所等按需即兴。）
【有哪些】·城防与警队：处理寻常治安、疏散、宵禁、封锁现场，遇魔物则报异事局接手，是民众遇险的第一反应对象。·媒体与报社：报道魔物事件等级与范围、追星与爆料齐飞，也受官方信息管控与资本影响，真假难辨的"目击料"多由此扩散。·医院与民间净化：寻常伤病由医院管，轻度侵蚀由持证净化师在民间诊所处理，重症才送官方设施。·学校与市政：普通学校、市政厅、避难所管理、结界与警报维护——支撑平民日常运转的那一层。
【与异常的边界】常人机构对"魔人""恶堕"知之甚少（属官方机密，见社会常识）；被寄生致死多被归为"魔物袭击"，清道夫战后会洗去平民相关记忆。故这些机构常在不知情中与异常擦肩，偶有敏锐的记者、警官、医者察觉蹊跷，卷入远超预期的暗流。
【与各方】治安与信息上受异事局节制；媒体与娱乐工业、财阀相互影响；这层"常人日常"正是深渊化形眼线最爱潜伏的水面之下。
