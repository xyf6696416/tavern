<地理·北部战区细览>
极寒冻土、战事最频，军镇气息浓重，民风彪悍重义，对魔物之恨刻在骨子里。
【朔风·北疆军都】铁幕大营——北区驻军与异事局北区分局合署，半城皆兵；暖炉巷——地热民居区，北地少有的市井温情处；锻雪工坊——兵械工坊街，星器维修与改装的圣地；白祭场——祭奠历代战殁者的雪原碑林。
【烬炉城·地热之城】沸泉环——温泉与疗养所环布，伤员与老兵的休整地；硫光市——地热矿物交易市集。
【玄冰关·前线重镇】终年风雪的雄关：凛冬学院（大型魔法学院，校风以严苛著称）、雪原猎区（暴风雪中的实战历练场）、关墙堡市（依关墙而建的猎人市镇）。
【招牌人物·举隅】「霜锋」燕九——玄冰关一线的战姬级官方王牌，沉默寡言、出手极快、带过几茬新兵，重义、对魔物之恨刻骨。（可沿用或另创。）
