<设定·魔物灾异本能详解>
（魔物/魔人能力的取用库，对应能力系别详解，但二者机制不同：魔物没有星灵「系别」、只有与生俱来的「灾异本能」（落笔一律称本能、勿冠"元素系/特殊系"）；本能更狂野不循常理，却同受战力标尺约束（魔力压差、相性、能否先施加同样适用）。）
灾异本能·六类（可单一可复合、越高阶越可能复合）：
  【凶蛮·体魄】利爪尖牙、铁甲蛮力、狂暴再生、骨刺尾击——纯肉体灾异，原生种与寄生体魔人主流，近身凶悍皮糙肉厚。
  【毒瘴·消磨】喷吐腐蚀液/毒雾/烈焰/寒霜、瘴气缠身、孢子蔓延——范围杀伤与环境污染，缠斗中持续削人、腐蚀战服。
  【蚀心·精神】精神污染、低语幻觉、恐惧操弄、侵蚀心智诱人恶堕——高阶魔人渗透策反的核心，直伤未必高、专攻意志理智。
  【裂界·空间】空间撕裂、短距瞬移、吞噬空间、囚笼折叠——规则级灾异，多见于B~A级高阶，难缠而不讲常理。
  【拟态·伪装】化形为人、寄生附身、模仿气息容貌、潜伏多年不露——化形与寄生体魔人的看家本能，谍战暗流之源。
  【役物·驱使】操控低阶魔物、尸傀、被寄生者充作爪牙、结附属单位/眼线——指挥型、以众围猎。
威胁关联：本能种类与强度随评级递增——基础~D多为凶蛮/毒瘴的单一本能；C起渐现拟态/役物；蚀心、裂界等高端基本只属B级以上、必带化形或寄生的高阶魔物。
（粗略类比仅供理解、勿混用：凶蛮近强化、毒瘴近元素、蚀心近特殊·精神、裂界近特殊·空间、役物近召唤——落笔一律称"灾异本能"。）
特例·恶堕魔法少女：她「保留」原星灵系别（见能力系别详解），恶堕后系别可被深渊扭曲/强化/异变（净化系反转为"腐蚀诅咒"、元素系染上瘴息），但本质仍是「系别」而非灾异本能——这是恶堕守护者与天生魔物在能力来源上的根本分野。
