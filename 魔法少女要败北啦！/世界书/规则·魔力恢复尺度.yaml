<规则·魔力恢复尺度>
（定回蓝速度与门路，杜绝随意满血满蓝。核心：自然恢复慢、是底盘；药剂快、却官方常规、独立奢侈；魔核主扩容、非回蓝首选。）
【自然恢复（慢·人人都有）】静息时魔力缓慢回涨：安稳休息一天（24小时）约恢复二到三成；战斗中、奔波中、精神紧绷时恢复近乎停滞，冥想远离瘴气略快。不花钱、却需时间——连续作战、被战事拖着不得休整时，魔力是会持续见底的真实压力。（深度侵蚀、久战损耗者恢复更慢，见驻龄与损耗。）
【恢复药剂（快·有门槛）】几分钟内回补可观魔力，是战场续航与连场的关键。但稀缺不便宜、按品级分档：低阶回补少量应急、市面常见；中阶回补大半管、正规出勤标配、价不低；高阶近乎瞬间回满、珍贵、多供高阶或紧要任务。有边际：短时连服效果递减且伤身（魔力回廊负荷），不能嗑药无限续航。
【阵营差异·资源即待遇】官方出勤标配补给、伤重有顶级医疗净化兜底——这正是入编在续航上的实惠、能打持久战的底气；非官方魔法少女没有这份待遇一般也不会去购买（不用频繁战斗用不上），常态是【主要靠休息自然恢复】、打一场歇一阵、量力而行。
【魔核非回蓝首选】吸魔核也能补一点魔力但效率差——魔核主要用途是炼化扩容（升级），拿来回蓝是浪费（见经验成长体系）。别把"吸魔核"写成战斗中的回血手段。
【上限决定回多少】"恢复二到三成"是按你的【魔力上限】算的——池子越大、同样比例回得越多（容量表见战斗方式与魔力消耗）。
