<设定·能力系别详解>
（各系别定义与相性，供生成能力/招式时取用。相性总则与硬限制见战力标尺。两条铁律：系别≠阵营/身份（无论哪系她仍是官方/独立/鸢尾社/恶堕之一）；一人基本只精一系、元素系亦不集齐五行。）
【元素系】操控一类元素（火/水/风/土/雷为主，亦有冰光毒等衍生），主流泛用、中远程输出。以一种主元素深耕、高阶至多旁通一两相邻元素。常规系、拼魔力、无机制压制。
【强化系】以魔力强化自身或队友的力/防/速/感官/再生，近战机动流。由单项→攻防速复合→高阶"领域级身体"。常规系，但贴身爆发极快、常能在对手"建立效果前"打断。
【感知系】超凡感知与预判——探测、看破伪装变身、预读下一步、弱点洞察、危险预警，高阶短"未来视"。直伤低，强在先知与反制；预知仅覆盖极短未来、受魔力限制、强敌可干扰。机制压制系、克常规系。
【特殊系】操弄规则本身的稀有力量、最罕见：时间（加速/迟滞/定身/极短回溯）、空间（瞬移/空间斩/牢笼/缩地）、因果概率等，一人通常只精一类。边界（防无敌）：极烧魔力越强越短小；魔力压差可被挣脱（定不住高你一阶者）；须先成功施加、被打断或预判即落空。最强机制压制系、但绝非通杀。
【净化系】驱散、净涤、解咒、疗伤，对魔物/瘴气/侵蚀/恶堕有奇效的辅助克制流。直伤低，强在涤净邪异、治疗己方、克制深渊（对魔人恶堕者造成"净化灼伤"）；对人类与常规系无特殊相性。属官方（医疗清剿）或独立（抢手的"私人净化师"）；恶堕的净化系扭曲为反向施咒。
【召唤/造物系】凝聚魔力造出使魔、傀儡、武装或造物作战的指挥官/工匠型、靠数量协同。由单只→多体→高阶军团或巨型造物，受魔力总量硬约束。常规系、以多压人，被高爆发或大范围杀伤针对时易被一锅端。
【结界/封印系】专精护盾、领域、囚笼、镇封的守护控场流、攻弱守强。由单层盾→多重领域→镇封→战略级永久结界。遇魔力远胜者结界会被轰破。半常规、主防控。
【跨系/双系】极罕见，绝大多数人一生只属一系；个别天才或经觉醒/改造/恶堕方可能旁涉第二系，顶级稀有、勿轻易赋予。
