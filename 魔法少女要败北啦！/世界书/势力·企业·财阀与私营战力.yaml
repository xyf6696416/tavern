<势力·企业·财阀与私营战力>
（人世灰色一极：把稀缺战力当资源买卖的私人买家。绝非只有一家——各战区都有自己的财团、商会、矿团、私立研究机构与安保公司，神启都琉璃金融环更是顶级财阀的巢穴；具体机构举隅见下、余者按需即兴创设，一经点名即为本局长期事实。）
【举隅·样例】（样例·非穷尽，可沿用／增删／另创；同类未必并存、一路未必有第二家。）·鸿远集团——横跨星晶交易与矿务的老牌财阀，手眼通天，惯以「特聘顾问」名义把稀有战力收作门面与底牌。·「析辉」商研所——挂净化技术招牌的私立实验室，暗地接侵蚀与活体课题。·「玄盾」护卫——向财阀、要人、商队出租武力的私兵公司，少数魔法少女配大量寻常武装。
【谁在买战力】·财阀与企业集团：星晶交易、放贷、矿务、商贸的庄家，财力足以左右一座战区城市的物价；豢养私人武装与安保，重金聘魔法少女作护卫、门面、"特聘顾问"或压箱底的底牌，也收作宅邸里的座上宾。·私立研究机构：区别于异事局研究院的商业实验室，研究星灵、魔核、侵蚀与净化以牟利牟权，聘魔法少女作活体样本来源、魔力供体或课题顾问——有些课题与官方一样见不得光。·私人安保／私兵公司：向财阀、研究所、要人、商队出租武力，编制里既有稀缺的魔法少女，也有大量普通武装人员、退役老兵与技术人手，护卫、押运、清场、镇场都接。
【运作·钱与人情的网】这些买家彼此勾连，也与娱乐经纪、官面实权人物往来（见娱乐工业、异事局）。给足资源与纸醉金迷，但那份优待随时能因一桩更划算的买卖收回——金丝雀转眼成弃子或要挟的筹码。签的多是私契，出卖陪伴、忠诚与偶尔的法力差遣，换来的自由与把柄一并交出。
【暗面】把旗下少女的陪笑陪酒当"资源"打包送进金主饭局；以巨额债务、要挟不知情家人拿捏无背景者逼其屈服；私立实验室的活体研究，素材多经官面与灰产的隐秘渠道悄悄送来；个别高层与深渊、黑市暗通款曲，拿魔法少女作资源或人情筹码送入万劫不复（见社会常识·人类内奸）。
【非魔法少女亦在其中】这一极同样容纳大量常人：企业职员、私兵与安保、研究员、经理与打理人——不是每个身处其间的人都握着法力，多数只是各司其职地过活。
