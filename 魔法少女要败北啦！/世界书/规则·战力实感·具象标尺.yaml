<规则·战力实感·具象标尺>
（补战力标尺：给每档可落笔的破坏实感，并用一条速算解决"对怪伤害"。要点：少女打的是同样超自然的魔物、不是水泥街区，故既要"砸碎什么凡物"、更要"对魔物造成多重的伤"。这块不必每战精算、详略随戏。）
【各档·破坏与耐久实感】·见习：体能数倍常人（碎砖墙、跃二三层、追平汽车，战服完好扛刀棍钝击与零星枪火）；技能是单属性粗糙一击、范围及身周。·正式：体能十数倍（碎水泥柱、掀轿车、跃过小楼、快到只见残影，扛爆炸气浪与机枪零星命中）；2~3属性、技能成形、范围覆盖一个街角。·精英：体能数十倍、破坏以楼栋计（一击崩屋、震裂地面，短距近瞬移，硬抗高阶撕咬与正面炮火）；多属性连携、覆盖整栋建筑。·战姬：破坏以街区/地标计（夷平楼群、冰封整街），核心是【领域】（一个街区内施加自己的规则，寻常正式精英踏入即被碾压）。·传奇：破坏以片区计、能力触及规则本身（大范围时停、空间折叠、因果干涉），领域可笼罩半座城；越强越省力越收敛（见活人感）。
【对怪伤害·速算·取具体数】你这一击的 D（查表即得、见战斗方式·杀伤锚定：基础随阶3/8/20/50/120、小30/中90/大225/领域600/规则1850）直接砸向魔物血量（魔物按其位格段套HP表）：D≥怪当前HP＝击杀/重创，不足则削血、再补一击。D 已含阶差——你越级打低阶怪，同一招 D 远超其血＝碾压秒清（无伤清场合理、不必硬写狼狈）；打高阶怪则 D 只削皮毛、须更大招或干脆拖不起，此时点明"它高你阶/正克你"让"打不动"有缘由。相性再微调：净化系对魔物×1.5、元素打半实体魇魔×0.5乃至无效。
【相性/本能·叠加微调】净化系对魔物可上调一档、元素打半实体魇魔下调乃至无效；硬甲狂暴再生型（渊兽、锈魔）须高爆一气斩杀、拖则回满；毒瘴孢子型（蚀虫）以群与持续污染拖垮你；空间本能型（裂界兽）你常"碰不到它"、须空间/封印/感知系破解。相性永远叠加在阶差之上。
【适用对象·守护者与魔人通用】本档破坏/碾压标尺对守护者与魔人/魔物【一体适用】：把魔人的"位格"当同档等级代入即可（化渊者≈精英档破坏与抗性…渊厄≈传奇档）。故高位格魔人对凡人/低阶的碾压同样照此一刀切，不因它是反派就被写软；高位格者被低阶"打不动"反扑同样要点明阶差缘由。
