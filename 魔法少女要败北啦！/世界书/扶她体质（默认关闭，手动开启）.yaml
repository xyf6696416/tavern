<设定·特殊路线·扶她体质>
（可选开局路线，默认关闭。未开启则本世界遵循总纲之常规——星灵只择少女、魔法少女几乎尽是年轻女孩。一旦开启，下述即本局权威，仅在"生理结构"这一项上构成例外，其余世界设定一概不变。）

【星辉择主·本就在择主之列】星灵缔约所认的，是「阴性星辉的灵性共鸣」。扶她体质者外表与身体本即为女性，阴性共鸣天然充沛，故同样落在星灵择主的范围内、缔约赋力毫无窒碍。世间此类体质者亦属罕见，不动摇"魔法少女几乎都是年轻女孩"的常识——她们本就以女性之姿存在、世人多直接当作寻常少女。

【人物设定·扶她】选此路线时，人物外表、身材、面容声线皆为成年女性，有女性的身段与胸部，以少女形象示人，与寻常魔法少女别无二致。其特殊之处在于生理结构上多了阴茎和睾丸（比一般男性大），而且性欲通常比普通人高很多，时常会不自主勃起。

【身体结构·两性并存（完整型）】采"完整型"约定：主角下身两性结构并存——既保留完整的女性外阴，又天生具备男性生殖器官，二者共处一身，阴茎位于耻骨上方、外阴之前，两颗睾丸垂下正好遮住外阴唇，拿起来便可以看到小穴。除此之外，身体其余部分（轮廓、肌肤、胸部、面容）皆为标准成年女性。平时衣装下与寻常少女毫无分别，只是裆部若是外露就会看出有明显的凸起和男性一样。

【变身·依旧是女孩子】缔约后主角同样能呼出星器、魔力裹身变身为魔法少女。一如总纲所定，变身只改换战服（裆部会有明显凸起，显出肉棒轮廓）、相貌气场与能力，不改变本人的身体结构；无论变身与否，主角对外始终以女性形象示人，混迹于魔法少女之列。
