# M-life 变量列表

## 系统
- 日期: 当前日期
- 时间: 当前时间
- 位置: 当前所在位置

## M-life_经济
- M币余额: 当前M币数量，用于打赏、解锁内容、购买VIP
- 累计充值: 历史累计充值总额

## M-life_用户
- 用户等级: Lv1~Lv5，影响每日匹配/发帖次数
- 经验值: 当前经验值，升级阈值: Lv1→Lv2(100) Lv2→Lv3(300) Lv3→Lv4(600) Lv4→Lv5(1000)
- VIP类型: 无/白银/黄金/黑金
- VIP到期日: VIP到期日期
- 昵称: 用户的昵称
- 年龄: 用户年龄

## M-life_社交
- 获赞总数: 累计获赞数
- 匹配成功数: 累计匹配成功次数
- 粉丝数: 粉丝数量
- 关注数: 关注人数
- 今日匹配次数: 今日已使用匹配次数，每日重置
- 今日发帖次数: 今日已发帖次数，每日重置
- 今日已签到: true/false，每日重置
- 连续签到天数: 连续签到天数，断签重置为0

## M-life_私信
- 未读私信数: 未读私信数量
- 最近联系人: 最近5个联系人昵称，逗号分隔

## M-life_黑金
- 进行中招募数: 当前进行中的招募数量
- 已报名招募数: 已报名的招募数量

## M-life_角色库
- 角色列表: 已生成的角色JSON数组字符串，每项包含角色的完整信息（昵称、年龄、职业、外表、性格、身体数据、平台信息等），初始为[]

## M-life_角色详情
- 已开盒角色: 已开盒角色的ID列表，JSON数组字符串，每项存角色唯一ID，用于防重复扣费
- 角色详情缓存: 开盒时角色数据的完整快照，JSON数组字符串，每项为完整角色JSON对象，确保用户看到的是开盒时的数据